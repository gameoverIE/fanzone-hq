<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FANZONE HQ — Project Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --yellow:#F8FA0F; --black:#0A0A0A; --ink:#141414; --bg:#FAFAF8;
    --card:#FFFFFF; --line:#E7E7E2; --muted:#74746E; --soft:#9A9A93;
    --sidebar:#0A0A0A;
    --done:#15A34A; --done-bg:#E6F6EC;
    --prog:#2563EB; --prog-bg:#E6EDFD;
    --block:#DC2626; --block-bg:#FBE9E9;
    --idle:#8A8A82; --idle-bg:#EEEEEA;
    --hi:#DC2626; --med:#D97706; --lo:#8A8A82;
    --shadow:0 1px 2px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.05);
    --shadow-lg:0 8px 40px rgba(0,0,0,.16);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter','Helvetica Neue',Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
    font-size:14px;line-height:1.5;font-feature-settings:"cv11","ss01","ss03";letter-spacing:-0.005em;
  }
  .display{font-family:inherit;font-weight:800;letter-spacing:.02em;text-transform:uppercase}
  .skew{display:inline-block;transform:skewX(-7deg)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#d4d4cd;border-radius:6px;border:2px solid var(--bg)}
  ::-webkit-scrollbar-thumb:hover{background:#bdbdb5}

  /* ---------- shell ---------- */
  #app{display:flex;min-height:100vh}
  .sidebar{
    width:236px;background:var(--sidebar);color:#fff;flex-shrink:0;
    display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
  }
  .brand{padding:22px 22px 16px}
  .brand .logo-img{width:158px;height:auto;display:block}
  .brand .tag{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#7d7d77;margin-top:10px;font-weight:700}
  .stripe{height:10px;background:repeating-linear-gradient(135deg,var(--yellow) 0 11px,var(--black) 11px 22px)}
  .nav{padding:16px 12px;flex:1}
  .nav-label{font-size:10px;letter-spacing:.2em;color:#5f5f5a;font-weight:800;padding:6px 12px 8px;text-transform:uppercase}
  .nav-item{
    display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:8px;
    color:#b7b7b1;font-weight:500;font-size:13.5px;cursor:pointer;border:none;background:none;
    width:100%;text-align:left;transition:.13s;position:relative;letter-spacing:-0.005em;
  }
  .nav-item svg{width:17px;height:17px;flex-shrink:0;opacity:.85}
  .nav-item:hover{background:#1b1b1a;color:#fff}
  .nav-item:hover svg{opacity:1}
  .nav-item.active{background:#1b1b1a;color:#fff;font-weight:600}
  .nav-item.active svg{opacity:1}
  .nav-item.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;background:var(--yellow);border-radius:3px}
  .nav-item .cnt{margin-left:auto;background:#272725;color:#cfcfc9;font-size:11px;font-weight:600;
    padding:1px 8px;border-radius:20px;min-width:22px;text-align:center;letter-spacing:0}
  .nav-item.active .cnt{background:var(--yellow);color:#000;font-weight:700}
  .who{padding:14px 14px 18px;border-top:1px solid #232321}
  .who label{font-size:10px;letter-spacing:.16em;color:#5f5f5a;font-weight:700;display:block;margin-bottom:7px}
  .who select{
    width:100%;background:#1b1b1a;color:#fff;border:1px solid #2e2e2c;border-radius:8px;
    padding:9px 10px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;
  }
  .who .hint{font-size:10.5px;color:#5f5f5a;margin-top:8px;line-height:1.45}

  /* ---------- main ---------- */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{
    background:rgba(250,250,248,.86);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);padding:20px 30px 18px;
    position:sticky;top:0;z-index:20;display:flex;align-items:flex-end;gap:18px;flex-wrap:wrap;
  }
  .topbar .ttl{flex:1;min-width:200px}
  .topbar h1{font-family:inherit;font-size:24px;font-weight:800;line-height:1.1;letter-spacing:-0.02em;text-transform:none}
  .topbar .sub{color:var(--muted);font-size:13px;font-weight:500;margin-top:6px;letter-spacing:-0.005em}
  .view{padding:26px 30px 60px}

  /* ---------- buttons ---------- */
  .btn{
    font-family:inherit;font-weight:600;font-size:13px;border-radius:8px;padding:10px 16px;
    cursor:pointer;border:1px solid transparent;transition:.13s;display:inline-flex;
    align-items:center;gap:7px;white-space:nowrap;letter-spacing:-0.005em;
  }
  .btn svg{width:15px;height:15px}
  .btn-primary{background:var(--yellow);color:#000;border-color:#dcdd0c;font-weight:700}
  .btn-primary:hover{filter:brightness(1.05);transform:translateY(-1px)}
  .btn-dark{background:var(--black);color:#fff;font-weight:600}
  .btn-dark:hover{background:#262624;transform:translateY(-1px)}
  .btn-ghost{background:var(--card);color:var(--ink);border-color:var(--line);font-weight:500}
  .btn-ghost:hover{border-color:#bcbcb5;background:#fff;color:var(--ink)}
  .btn-sm{padding:7px 11px;font-size:12px;border-radius:7px}
  .btn-danger{background:var(--block-bg);color:var(--block);border-color:#f3cccc;font-weight:600}
  .btn-danger:hover{background:#f7dede}

  /* ---------- cards / grid ---------- */
  .grid{display:grid;gap:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .panel-h{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:11px}
  .panel-h svg{width:18px;height:18px;flex-shrink:0;color:var(--ink)}
  .panel-h h3{font-family:inherit;font-size:13px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--ink)}
  .panel-h .badge{margin-left:auto;font-size:11px;font-weight:600;color:var(--muted);background:var(--bg);
    padding:3px 10px;border-radius:20px;border:1px solid var(--line);letter-spacing:0}

  /* ---------- stat tiles ---------- */
  .stats{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:22px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;
    box-shadow:var(--shadow);position:relative;overflow:hidden}
  .stat .k{font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .stat .v{font-family:inherit;font-size:36px;font-weight:800;line-height:1;margin-top:10px;letter-spacing:-0.03em;font-variant-numeric:tabular-nums}
  .stat .v small{font-size:18px;color:var(--soft)}
  .stat .meta{font-size:11.5px;color:var(--soft);font-weight:500;margin-top:6px;letter-spacing:-0.005em}
  .stat.accent{background:var(--black);color:#fff}
  .stat.accent .k{color:#8f8f88}
  .stat.clickable{cursor:pointer;transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease}
  .stat.clickable:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(0,0,0,.08);border-color:#cfcfc8}
  .stat .stat-flags{font-size:30px;letter-spacing:.12em;line-height:1.05}
  .stat.accent .v{color:var(--yellow)}
  .stat.accent .meta{color:#8f8f88}
  .stat.warn .v{color:var(--block)}
  .stat .corner{position:absolute;right:-10px;top:-10px;width:46px;height:46px;
    background:repeating-linear-gradient(135deg,var(--yellow) 0 6px,transparent 6px 12px);opacity:.5;border-radius:8px}

  /* ---------- overview layout ---------- */
  .ov-grid{display:grid;grid-template-columns:1.55fr 1fr;gap:18px}
  .ws-row{padding:13px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:13px;cursor:pointer;transition:.1s}
  .ws-row:last-child{border-bottom:none}
  .ws-row:hover{background:var(--bg)}
  .ws-row .nm{font-weight:700;font-size:13px;width:150px;flex-shrink:0}
  .ws-row .nm small{display:block;font-weight:600;color:var(--soft);font-size:10.5px}
  .bar{flex:1;height:8px;background:#ECECE7;border-radius:6px;overflow:hidden;min-width:60px}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,#19b257,#15A34A);border-radius:6px;transition:width .5s}
  .ws-row .frac{font-family:inherit;font-size:13px;font-weight:700;width:54px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums;letter-spacing:-0.01em}
  .ws-row .pct{font-size:11px;color:var(--muted);font-weight:700;width:38px;text-align:right;flex-shrink:0}

  .att-row{padding:11px 18px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center;cursor:pointer}
  .att-row:last-child{border-bottom:none}
  .att-row:hover{background:var(--bg)}
  .att-row .tt{flex:1;font-weight:600;font-size:12.5px;line-height:1.35}
  .att-row .tt small{display:block;color:var(--soft);font-weight:600;font-size:10.5px;margin-top:1px}

  .date-row{padding:10px 18px;border-bottom:1px solid var(--line);display:flex;gap:12px;align-items:center}
  .date-row:last-child{border-bottom:none}
  .date-row .d{font-family:inherit;font-size:12px;font-weight:700;width:74px;flex-shrink:0;color:var(--ink);letter-spacing:-0.005em}
  .date-row .lbl{font-size:12px;font-weight:600;color:var(--muted);flex:1}
  .date-row .cd{font-size:10.5px;font-weight:800;color:#000;background:var(--yellow);padding:2px 8px;border-radius:20px}
  .date-row.past .cd{background:var(--idle-bg);color:var(--muted)}

  .load-row{padding:10px 18px;border-bottom:1px solid var(--line);display:flex;gap:11px;align-items:center}
  .load-row:last-child{border-bottom:none}

  /* ---------- avatar ---------- */
  .av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:11px;color:#fff;flex-shrink:0;letter-spacing:.02em}
  .av.sm{width:22px;height:22px;font-size:9px}
  .av.lg{width:52px;height:52px;font-size:18px}

  /* ---------- pills ---------- */
  .pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-flex;
    align-items:center;gap:5px;white-space:nowrap;border:1px solid transparent}
  .pill .dot{width:6px;height:6px;border-radius:50%}
  .pill.done{background:var(--done-bg);color:var(--done)}
  .pill.prog{background:var(--prog-bg);color:var(--prog)}
  .pill.block{background:var(--block-bg);color:var(--block)}
  .pill.idle{background:var(--idle-bg);color:var(--idle)}
  .pill.done .dot{background:var(--done)} .pill.prog .dot{background:var(--prog)}
  .pill.block .dot{background:var(--block)} .pill.idle .dot{background:var(--idle)}
  .pill.btnish{cursor:pointer} .pill.btnish:hover{filter:brightness(.96)}
  .prio{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
  .prio.hi{color:var(--hi)} .prio.med{color:var(--med)} .prio.lo{color:var(--lo)}
  .wstag{font-size:10.5px;font-weight:700;color:var(--muted);background:var(--bg);
    border:1px solid var(--line);padding:2px 8px;border-radius:6px;white-space:nowrap}

  /* ---------- toolbar ---------- */
  .toolbar{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
  .toolbar input[type=text]{
    font-family:inherit;font-size:13.5px;font-weight:500;padding:10px 13px;
    border:1px solid var(--line);border-radius:8px;background:var(--card);
    min-width:200px;flex:1;max-width:300px;color:var(--ink);letter-spacing:-0.005em;
  }
  .toolbar input[type=text]::placeholder{color:#a8a8a2;font-weight:500}
  .toolbar select{
    font-family:inherit;font-size:13px;font-weight:600;padding:10px 12px;border:1px solid var(--line);
    border-radius:8px;background:var(--card);cursor:pointer;color:var(--ink);
  }
  .toolbar input:focus,.toolbar select:focus{
    outline:none;border-color:var(--black);box-shadow:0 0 0 3px rgba(248,250,15,.55)}
  .seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--card)}
  .seg button{font-family:inherit;font-size:12px;font-weight:700;padding:9px 14px;border:none;
    background:none;cursor:pointer;color:var(--muted);letter-spacing:.01em}
  .seg button:hover{color:var(--ink)}
  .seg button.on{background:var(--black);color:#fff}
  .chip{font-family:inherit;font-size:12px;font-weight:600;padding:8px 13px;border-radius:8px;
    border:1px solid var(--line);background:var(--card);cursor:pointer;color:var(--muted);letter-spacing:0}
  .chip:hover{color:var(--ink);border-color:#bcbcb5}
  .chip.on{background:var(--yellow);color:#000;border-color:#dcdd0c;font-weight:700}

  /* ---------- task list ---------- */
  .ws-group{margin-bottom:14px}
  .ws-group-h{display:flex;align-items:center;gap:11px;padding:10px 4px;cursor:pointer}
  .ws-group-h h3{font-family:inherit;font-size:13px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--ink)}
  .ws-group-h .ld{font-size:11px;color:var(--muted);font-weight:600}
  .ws-group-h .mini{width:90px;height:6px;background:#ECECE7;border-radius:5px;overflow:hidden}
  .ws-group-h .mini i{display:block;height:100%;background:#15A34A}
  .ws-group-h .gf{font-size:11px;font-weight:700;color:var(--muted)}
  .ws-group-h .chev{margin-left:auto;color:var(--soft);transition:.15s}
  .ws-group.collapsed .chev{transform:rotate(-90deg)}
  .ws-group.collapsed .tasklist{display:none}
  .tasklist{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--card);box-shadow:var(--shadow)}
  .task{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--line);
    cursor:pointer;transition:.1s;border-left:3px solid transparent}
  .task:last-child{border-bottom:none}
  .task:hover{background:var(--bg)}
  .task.p-hi{border-left-color:var(--hi)} .task.p-med{border-left-color:var(--med)} .task.p-lo{border-left-color:#E2E2DC}
  .task .body{flex:1;min-width:0}
  .task .tt{font-weight:600;font-size:13.5px;line-height:1.4;letter-spacing:-0.01em;color:var(--ink)}
  .task .sub{display:flex;gap:9px;align-items:center;margin-top:5px;flex-wrap:wrap}
  .task .nt{font-size:11.5px;color:var(--soft);font-weight:400}
  .task .due{font-size:11.5px;font-weight:600;color:var(--muted);letter-spacing:0}
  .task .due.over{color:var(--block);font-weight:700}
  .task .rt{display:flex;align-items:center;gap:10px;flex-shrink:0}
  .id-tag{font-size:10px;font-weight:700;color:var(--soft);font-family:inherit;letter-spacing:.06em;text-transform:uppercase}

  /* ---------- board ---------- */
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .col{background:#F1F1EC;border:1px solid var(--line);border-radius:13px;display:flex;flex-direction:column;min-height:180px}
  .col.drop{outline:2px dashed var(--prog);outline-offset:-4px;background:#EDF1FB}
  .col-h{padding:12px 14px;display:flex;align-items:center;gap:8px;font-weight:800;font-size:12px;
    text-transform:uppercase;letter-spacing:.05em}
  .col-h .ct{margin-left:auto;background:#fff;border:1px solid var(--line);border-radius:20px;
    font-size:11px;padding:1px 8px;color:var(--muted)}
  .col-body{padding:0 9px 9px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1}
  .tcard{background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 12px;cursor:grab;
    box-shadow:0 1px 2px rgba(0,0,0,.04);border-left:3px solid #E2E2DC}
  .tcard:active{cursor:grabbing}
  .tcard.p-hi{border-left-color:var(--hi)} .tcard.p-med{border-left-color:var(--med)}
  .tcard.dragging{opacity:.4}
  .tcard .tt{font-weight:600;font-size:12.5px;line-height:1.35}
  .tcard .mt{display:flex;align-items:center;gap:7px;margin-top:9px;flex-wrap:wrap}

  /* ---------- team ---------- */
  .team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}
  .person{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;
    box-shadow:var(--shadow);transition:.13s;cursor:pointer}
  .person:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
  .person .top{display:flex;gap:13px;align-items:center}
  .person .nm{font-weight:800;font-size:15px}
  .person .ro{font-size:11.5px;color:var(--muted);font-weight:600}
  .person .org{font-size:9.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
    color:#000;background:var(--yellow);padding:2px 7px;border-radius:5px;display:inline-block;margin-top:5px}
  .person .org.bbk{background:#E4E4DF;color:var(--muted)}
  .contact{margin-top:14px;display:flex;flex-direction:column;gap:7px}
  .contact a,.contact span{display:flex;gap:9px;align-items:center;font-size:12.5px;
    color:var(--ink);text-decoration:none;font-weight:600}
  .contact svg{width:14px;height:14px;color:var(--soft);flex-shrink:0}
  .contact .empty{color:var(--soft);font-weight:500;font-style:italic}
  .person .wss{margin-top:13px;display:flex;gap:5px;flex-wrap:wrap}
  .person .stats2{margin-top:13px;padding-top:13px;border-top:1px solid var(--line);display:flex;gap:18px}
  .person .stats2 div{font-size:11px;color:var(--muted);font-weight:600}
  .person .stats2 b{font-family:inherit;font-size:18px;font-weight:800;color:var(--ink);display:block;letter-spacing:-0.02em;font-variant-numeric:tabular-nums}

  /* ---------- ideas ---------- */
  .ideas-board{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .icard{background:#fff;border:1px solid var(--line);border-radius:11px;padding:13px;box-shadow:var(--shadow);margin-bottom:9px}
  .icard .it{font-weight:700;font-size:13px;line-height:1.35}
  .icard .idt{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.45}
  .icard .ift{display:flex;align-items:center;gap:7px;margin-top:11px;padding-top:10px;border-top:1px solid var(--line)}
  .icard .ift .by{font-size:11px;color:var(--soft);font-weight:600;flex:1}

  /* ---------- assets ---------- */
  .dropbox-hero{display:flex;align-items:center;gap:16px;background:var(--black);color:#fff;
    border-radius:14px;padding:18px 20px;margin-bottom:18px;cursor:pointer;transition:.14s;
    border:1px solid var(--black);box-shadow:var(--shadow)}
  .dropbox-hero:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
  .dropbox-hero .db-ic{width:46px;height:46px;border-radius:11px;background:var(--yellow);
    display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .dropbox-hero .db-ic svg{width:24px;height:24px;color:#000}
  .dropbox-hero .db-body{flex:1;min-width:0}
  .dropbox-hero .db-nm{font-family:inherit;font-size:16px;font-weight:800;letter-spacing:-0.01em;text-transform:none}
  .dropbox-hero .db-note{font-size:12px;color:#9a9a93;margin-top:3px}
  .dropbox-hero .db-cta{display:flex;align-items:center;gap:6px;background:var(--yellow);color:#000;
    font-weight:800;font-size:12px;padding:9px 14px;border-radius:9px;white-space:nowrap}
  .dropbox-hero .db-cta svg{width:15px;height:15px}
  .asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:14px}
  .asset{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px 16px;
    box-shadow:var(--shadow);display:flex;flex-direction:column;transition:.12s}
  .asset:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
  .asset-top{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .asset-top .btn{margin-left:auto}
  .asset-nm{font-weight:800;font-size:13.5px;line-height:1.35}
  .asset-note{font-size:11.5px;color:var(--muted);margin-top:5px;flex:1;line-height:1.45}
  .asset-ft{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:11px;border-top:1px solid var(--line)}
  .alink{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--prog);
    text-decoration:none;flex:1}
  .alink svg{width:14px;height:14px}
  .asset-empty{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;
    color:var(--soft);font-style:italic;flex:1}
  .asset-empty svg{width:14px;height:14px}

  /* ---------- activity feed ---------- */
  .act-row{padding:10px 18px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:flex-start}
  .act-row:last-child{border-bottom:none}
  .act-b{flex:1;min-width:0}
  .act-t{font-size:12px;line-height:1.4;color:var(--ink)}
  .act-t b{font-weight:800}
  .act-d{font-size:11px;color:var(--soft);font-weight:500;margin-top:1px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .act-time{font-size:10.5px;color:var(--soft);font-weight:700;white-space:nowrap;flex-shrink:0}
  .cmt-c{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:800;color:var(--prog)}
  .cmt-c svg{width:11px;height:11px}

  /* ---------- comments ---------- */
  .comments{display:flex;flex-direction:column;gap:11px;margin-bottom:11px;max-height:230px;overflow-y:auto}
  .cmt{display:flex;gap:9px;align-items:flex-start}
  .cmt-b{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:8px 11px}
  .cmt-h{display:flex;gap:8px;align-items:baseline;margin-bottom:2px}
  .cmt-h b{font-size:12px;font-weight:800}
  .cmt-h span{font-size:10.5px;color:var(--soft);font-weight:600}
  .cmt-t{font-size:12.5px;line-height:1.45;color:var(--ink)}
  .cmt-empty{font-size:12px;color:var(--soft);font-style:italic;padding:6px 2px}
  .cmt-add{display:flex;gap:8px}
  .cmt-add input{flex:1;font-family:inherit;font-size:13px;padding:9px 11px;
    border:1px solid var(--line);border-radius:8px}
  .cmt-add input:focus{outline:2px solid var(--yellow);outline-offset:-1px}

  /* ---------- deadlines ---------- */
  .panel-h.danger{background:var(--block-bg);border-bottom-color:#f3cccc}
  .panel-h.danger h3{color:var(--block)}
  .panel-h.danger svg{color:var(--block)}

  /* ---------- meeting mode ---------- */
  .meeting{max-width:840px;margin:0 auto}
  .m-actions{display:flex;align-items:center;gap:9px;margin-bottom:16px}
  .m-doc{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:34px 38px;box-shadow:var(--shadow)}
  .m-head{display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:3px solid var(--black);padding-bottom:14px;margin-bottom:20px}
  .m-kicker{font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .m-head h1{font-size:34px;line-height:1;margin-top:5px}
  .m-date{font-size:12px;font-weight:700;color:var(--muted);text-align:right}
  .m-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:24px}
  .m-stat{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px;text-align:center}
  .m-stat b{font-family:inherit;font-size:24px;font-weight:800;display:block;line-height:1;letter-spacing:-0.02em;font-variant-numeric:tabular-nums}
  .m-stat span{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
  .m-h2{font-family:inherit;font-size:13px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--ink);
    margin:22px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--line)}
  .m-table{width:100%;border-collapse:collapse}
  .m-table td{padding:6px 8px;font-size:12px;border-bottom:1px solid var(--line);vertical-align:middle}
  .m-table td:first-child{font-weight:700;padding-left:0}
  .m-row{display:flex;gap:9px;align-items:center;padding:7px 0;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .m-row:last-child{border-bottom:none}
  .m-tt{font-weight:700;font-size:12.5px}
  .m-meta{font-size:11px;color:var(--muted);font-weight:600}
  .m-empty{font-size:12px;color:var(--soft);font-style:italic;padding:5px 0}
  .m-act{font-size:12px;padding:5px 0;border-bottom:1px solid var(--line);color:var(--ink)}
  .m-act:last-child{border-bottom:none}
  .m-act b{font-weight:800}
  .m-act span{color:var(--soft);font-weight:700;font-size:10.5px}

  @media print{
    .sidebar,.topbar,#banner,#toast,.m-actions,.no-print{display:none!important}
    .main,.view{padding:0!important;margin:0!important}
    body{background:#fff}
    .m-doc{border:none;box-shadow:none;border-radius:0;padding:0;max-width:100%}
    .meeting{max-width:100%}
    @page{margin:16mm}
  }

  /* ---------- login + accounts ---------- */
  #login{position:fixed;inset:0;z-index:300;background:var(--black);
    display:none;align-items:center;justify-content:center;padding:24px;
    background-image:repeating-linear-gradient(135deg,#0e0e0c 0 28px,#0a0a0a 28px 56px)}
  #login .lg-card{width:382px;max-width:100%}
  #login .lg-logo{width:212px;display:block;margin:0 auto 9px}
  #login .lg-sub{text-align:center;color:#7d7d77;font-size:11px;font-weight:700;
    letter-spacing:.2em;text-transform:uppercase;margin-bottom:28px}
  #login .lg-box{background:#141413;border:1px solid #272725;border-radius:16px;
    padding:26px 24px;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  #login h2{font-family:inherit;font-size:18px;font-weight:800;letter-spacing:-0.01em;color:#fff;margin-bottom:18px;text-transform:none}
  #login .lg-fld{margin-bottom:13px}
  #login label{font-size:10.5px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;
    color:#8f8f88;display:block;margin-bottom:6px}
  #login input{width:100%;background:#0c0c0b;border:1px solid #2e2e2c;border-radius:9px;
    padding:11px 13px;color:#fff;font-family:inherit;font-size:14px}
  #login input:focus{outline:2px solid var(--yellow);outline-offset:-1px}
  #login .lg-submit{width:100%;background:var(--yellow);color:#000;border:none;border-radius:9px;
    padding:13px;font-family:inherit;font-weight:800;font-size:14px;cursor:pointer;margin-top:6px}
  #login .lg-submit:hover{filter:brightness(1.05)}
  #login .lg-submit:disabled{opacity:.6;cursor:default}
  #login .lg-toggle{text-align:center;margin-top:16px;color:#8f8f88;font-size:12.5px;cursor:pointer}
  #login .lg-toggle b{color:var(--yellow)}
  #login .lg-err{font-size:12px;font-weight:600;color:#ff6b6b;margin-top:12px;
    text-align:center;min-height:16px;line-height:1.4}
  #login .lg-err.ok{color:#3ddc84}
  .me-chip{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .me-info{min-width:0}
  .me-name{font-weight:800;font-size:13px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .me-role{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#7d7d77}
  .me-role.admin{color:var(--yellow)}
  .signout{width:100%;background:#1b1b1a;color:#cfcfc9;border:1px solid #2e2e2c;border-radius:8px;
    padding:8px;font-family:inherit;font-weight:700;font-size:12px;cursor:pointer}
  .signout:hover{background:#232321;color:#fff}
  .acc-row{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--line)}
  .acc-row:last-child{border-bottom:none}
  .acc-row .nm{font-weight:700;font-size:13px}
  .acc-row .em{font-size:11.5px;color:var(--muted)}

  /* ---------- invoices ---------- */
  .inv-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
  .inv-stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px}
  .inv-stat .k{font-size:10.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .inv-stat .v{font-size:30px;font-weight:800;letter-spacing:-0.025em;margin-top:8px;font-variant-numeric:tabular-nums;color:var(--ink)}
  .inv-stat .m{font-size:11.5px;color:var(--soft);font-weight:500;margin-top:4px}

  .inv-board{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:flex-start}
  .inv-col{background:#fafaf6;border:1px solid var(--line);border-radius:12px;padding:14px}
  .inv-col-h{display:flex;justify-content:space-between;align-items:center;padding:6px 4px 14px;
    border-bottom:1px solid var(--line);margin-bottom:14px}
  .inv-col-h h3{font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ink)}
  .inv-col-h.pending h3{color:#d97706}
  .inv-col-h.approved h3{color:#2563EB}
  .inv-col-h.paid h3{color:#15A34A}
  .inv-col-h .ct{background:#fff;border:1px solid var(--line);font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:10px;color:var(--muted)}
  .inv-col-body{display:flex;flex-direction:column;gap:9px}
  .inv-empty{font-size:12px;color:var(--soft);font-style:italic;text-align:center;padding:18px 0}

  .inv-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:13px 14px;cursor:pointer;transition:transform .14s,box-shadow .14s,border-color .14s}
  .inv-card:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(0,0,0,.06);border-color:#cfcfc8}
  .inv-card-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:5px}
  .inv-supplier{font-weight:700;font-size:13px;color:var(--ink);letter-spacing:-0.005em;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .inv-amount{font-weight:800;font-size:15px;color:var(--ink);letter-spacing:-0.015em;font-variant-numeric:tabular-nums}
  .inv-desc{font-size:11.5px;color:var(--muted);font-weight:500;margin-bottom:8px;line-height:1.4;
    overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .inv-foot{display:flex;justify-content:space-between;align-items:center;font-size:10.5px;font-weight:600;color:var(--muted)}
  .inv-file{display:inline-flex;align-items:center;gap:4px;color:var(--ink);font-weight:600}
  .inv-file svg{width:11px;height:11px}
  .inv-due{font-weight:700;color:var(--muted)}
  .inv-due.overdue{color:#DC2626}
  .inv-ws{margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)}
  .inv-ws .wstag{font-size:9.5px}

  .inv-modal-head{padding:22px 22px 20px;background:linear-gradient(180deg,#fff,#fafaf6);border-bottom:1px solid var(--line);text-align:center}
  .inv-head-supplier{font-weight:700;font-size:15px;letter-spacing:-0.005em;color:var(--muted);margin-bottom:4px}
  .inv-head-amount{font-weight:800;font-size:34px;letter-spacing:-0.03em;color:var(--ink);font-variant-numeric:tabular-nums;margin-bottom:18px}
  .inv-status-row{display:flex;gap:7px;justify-content:center}
  .inv-st-btn{background:#fff;border:1px solid var(--line);border-radius:20px;padding:7px 14px;
    font-family:inherit;font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
    cursor:pointer;color:var(--muted);transition:.14s}
  .inv-st-btn:hover{border-color:#bcbcb5;background:#fafaf6}
  .inv-st-btn.on.pending{background:#fef3c7;color:#92400e;border-color:#fcd34d}
  .inv-st-btn.on.approved{background:#dbeafe;color:#1e40af;border-color:#93c5fd}
  .inv-st-btn.on.paid{background:#dcfce7;color:#166534;border-color:#86efac}
  .inv-meta-line{font-size:11.5px;color:var(--muted);font-weight:500;margin-top:12px}

  @media (max-width:900px){
    .inv-stats{grid-template-columns:repeat(3,1fr);gap:8px}
    .inv-stat{padding:12px}
    .inv-stat .v{font-size:22px}
    .inv-board{grid-template-columns:1fr;gap:10px}
  }

  /* ---------- person profile ---------- */
  .person-link{cursor:pointer;display:inline-flex;align-items:center;gap:6px;border-radius:6px;
    padding:1px 4px;margin:-1px -4px;transition:background .12s}
  .person-link:hover{background:rgba(248,250,15,.35)}
  .person-h{padding:22px 24px 16px;display:flex;gap:16px;align-items:flex-start;border-bottom:1px solid var(--line)}
  .person-h .av{width:60px;height:60px;font-size:21px;flex-shrink:0}
  .ph-info{flex:1;min-width:0}
  .ph-info h2{font-weight:800;font-size:22px;letter-spacing:-0.015em;color:var(--ink);margin-bottom:4px}
  .ph-role{color:var(--muted);font-size:13px;font-weight:500;margin-bottom:8px}
  .org-bbk{color:#2563EB;font-weight:700}
  .org-go{color:#0A0A0A;font-weight:700}
  .ph-contact{display:flex;gap:14px;flex-wrap:wrap;font-size:12px}
  .ph-contact a{color:var(--ink);text-decoration:none;display:inline-flex;align-items:center;gap:5px;font-weight:500}
  .ph-contact a:hover{color:#2563EB}
  .ph-contact a svg{width:13px;height:13px}
  .person-wss{padding:12px 24px;border-bottom:1px solid var(--line);display:flex;gap:6px;flex-wrap:wrap;background:#fafaf6}
  .person-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0;padding:0;border-bottom:1px solid var(--line)}
  .person-stat{text-align:center;padding:18px 12px;border-right:1px solid var(--line)}
  .person-stat:last-child{border-right:none}
  .person-stat .v{font-weight:800;font-size:28px;color:var(--ink);letter-spacing:-0.02em;font-variant-numeric:tabular-nums;line-height:1}
  .person-stat .k{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  .person-body{max-height:50vh;overflow-y:auto}
  .person-section{padding:18px 24px;border-bottom:1px solid var(--line)}
  .person-section:last-child{border-bottom:none}
  .person-section h3{font-size:10.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);margin-bottom:12px}
  .person-task{display:flex;gap:11px;padding:10px 12px;background:#fafaf6;border-radius:8px;
    margin-bottom:6px;cursor:pointer;align-items:center;transition:background .12s}
  .person-task:hover{background:#f4f4f0}
  .person-task .pill{flex-shrink:0}
  .person-task .pt-body{flex:1;min-width:0}
  .person-task .pt-title{font-weight:600;font-size:13px;color:var(--ink);letter-spacing:-0.005em}
  .person-task .pt-sub{font-size:11.5px;color:var(--muted);font-weight:500;margin-top:2px}
  .ps-empty{font-size:12.5px;color:var(--muted);font-style:italic;padding:8px 0}
  .person-cmt-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
  .person-cmt{background:#fafaf6;border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:12.5px;line-height:1.5}
  .person-cmt .pc-h{display:flex;justify-content:space-between;margin-bottom:4px}
  .person-cmt .who{font-weight:700;color:var(--ink);font-size:11.5px}
  .person-cmt .ts{font-size:10.5px;color:var(--muted);font-weight:500}
  .person-cmt .pc-t{color:var(--ink);font-weight:500;letter-spacing:-0.005em}
  .person-cmt-add{display:flex;gap:8px}
  .person-cmt-add input{flex:1;border:1px solid var(--line);border-radius:8px;padding:9px 11px;
    font-family:inherit;font-size:13px;font-weight:500;background:#fff}
  .person-cmt-add input:focus{outline:none;border-color:var(--black);box-shadow:0 0 0 3px rgba(248,250,15,.55)}

  /* ---------- timeline ---------- */
  .tl-filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .tl-day-h{font-weight:800;font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--muted);margin:22px 0 12px;padding-left:36px;position:relative}
  .tl-day-h:first-child{margin-top:0}
  .tl-day-h::before{content:'';position:absolute;left:9px;top:50%;width:11px;height:11px;
    border-radius:50%;background:var(--yellow);transform:translateY(-50%);box-shadow:0 0 0 3px var(--bg)}
  .tl-stream{position:relative;padding-left:36px;margin-bottom:14px}
  .tl-stream::before{content:'';position:absolute;left:14px;top:0;bottom:0;width:2px;background:var(--line)}
  .tl-row{position:relative;display:flex;gap:10px;padding:9px 0;align-items:flex-start}
  .tl-row .tl-dot{position:absolute;left:-31px;top:9px;width:26px;height:26px;border-radius:50%;
    background:#fff;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;
    color:var(--muted)}
  .tl-row .tl-dot svg{width:12px;height:12px}
  .tl-row.tl-tasks .tl-dot{border-color:#2563EB;color:#2563EB}
  .tl-row.tl-ideas .tl-dot{border-color:#d97706;color:#d97706}
  .tl-row.tl-meetings .tl-dot{border-color:#15A34A;color:#15A34A}
  .tl-row.tl-matches .tl-dot{border-color:#0A0A0A;color:#0A0A0A;background:var(--yellow)}
  .tl-row.tl-people .tl-dot{border-color:#7c3aed;color:#7c3aed}
  .tl-content{flex:1;min-width:0}
  .tl-line{font-size:13px;line-height:1.5;letter-spacing:-0.005em}
  .tl-line .who{font-weight:700;color:var(--ink)}
  .tl-line .ax{color:var(--ink);font-weight:500}
  .tl-line .det{color:var(--muted);font-weight:500}
  .tl-time{font-size:11px;color:var(--soft);margin-top:2px;font-weight:500}

  /* ---------- matches ---------- */
  .next-up-banner{background:linear-gradient(135deg,#0A0A0A 0%,#1f1f1d 100%);color:#fff;
    padding:18px 22px;border-radius:14px;margin-bottom:20px;display:flex;align-items:center;
    gap:18px;box-shadow:0 10px 30px rgba(0,0,0,.18);position:relative;overflow:hidden}
  .next-up-banner::after{content:'';position:absolute;right:-20px;top:-20px;width:140px;height:140px;
    background:radial-gradient(circle,rgba(248,250,15,.15),transparent 70%);pointer-events:none}
  .next-up-banner.live{background:linear-gradient(135deg,#7a1212 0%,#9b1717 100%)}
  .next-up-banner.live::before{content:'';position:absolute;top:14px;left:14px;width:8px;height:8px;
    background:#ff3030;border-radius:50%;animation:livepulse 1.4s infinite}
  @keyframes livepulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
  .nu-left{flex:1;min-width:0}
  .nu-label{font-size:10px;font-weight:800;letter-spacing:.22em;color:var(--yellow);text-transform:uppercase}
  .next-up-banner.live .nu-label{color:#fff}
  .nu-teams{display:flex;align-items:center;gap:9px;margin-top:8px;font-size:17px;font-weight:700;flex-wrap:wrap}
  .nu-flag{font-size:26px;line-height:1}
  .nu-vs{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.55);padding:0 3px}
  .nu-meta{font-size:12px;color:rgba(255,255,255,.7);margin-top:6px;letter-spacing:-0.005em}
  .nu-cd{font-size:26px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;color:var(--yellow);text-align:right;line-height:1}
  .next-up-banner.live .nu-cd{color:#fff}

  .match-filters{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  .match-chip{background:#fff;border:1px solid var(--line);border-radius:20px;padding:7px 14px;
    font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--ink);
    display:inline-flex;align-items:center;gap:7px;transition:.14s;letter-spacing:-0.005em}
  .match-chip:hover{border-color:#bcbcb5;background:#fafaf6}
  .match-chip.on{background:#0A0A0A;color:#fff;border-color:#0A0A0A}
  .match-chip .ct{background:#f0f0ec;color:#666;font-size:10.5px;padding:1px 7px;border-radius:10px;font-weight:700}
  .match-chip.on .ct{background:rgba(255,255,255,.18);color:#fff}

  .match-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
  .match-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 20px;
    cursor:pointer;transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease;
    position:relative;display:flex;flex-direction:column;gap:0}
  .match-card:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(0,0,0,.08);border-color:#cfcfc8}
  .match-card.next{box-shadow:0 0 0 2px var(--yellow),0 14px 32px rgba(248,250,15,.28)}
  .match-card.next::after{content:'NEXT UP';position:absolute;top:-10px;left:16px;
    background:var(--yellow);color:#0A0A0A;font-size:9px;font-weight:800;letter-spacing:.14em;
    padding:3px 9px;border-radius:5px;animation:nextpulse 2.4s ease-in-out infinite}
  @keyframes nextpulse{0%,100%{transform:translateY(0);box-shadow:0 2px 6px rgba(0,0,0,.1)}50%{transform:translateY(-2px);box-shadow:0 4px 10px rgba(248,250,15,.5)}}
  .match-card.live{box-shadow:0 0 0 2px #DC2626,0 14px 32px rgba(220,38,38,.25)}
  .match-card.live::after{content:'LIVE';position:absolute;top:-10px;left:16px;
    background:#DC2626;color:#fff;font-size:9px;font-weight:800;letter-spacing:.14em;padding:3px 9px;border-radius:5px}

  .match-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:9.5px;
    font-weight:800;letter-spacing:.1em;text-transform:uppercase}
  .match-stage{background:#f0f0ec;color:var(--ink);padding:3px 8px;border-radius:4px}
  .match-status{font-size:9.5px;color:var(--muted)}
  .match-status.status-confirmed{color:#15A34A}
  .match-status.status-tbc{color:var(--muted)}
  .match-status.status-optional{color:#d97706}
  .match-status.status-cancelled{color:#DC2626;text-decoration:line-through}
  .match-date-row{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.06em;margin-bottom:14px}

  .match-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:4px 0}
  .match-team{text-align:center;min-width:0}
  .match-team .flag{font-size:38px;line-height:1;display:block;margin-bottom:8px}
  .match-team .nm{font-weight:700;font-size:13px;letter-spacing:-0.01em;color:var(--ink);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .match-vs{font-weight:700;color:#bcbcb5;font-size:10px;letter-spacing:.18em;text-transform:uppercase}

  .match-time{text-align:center;padding:10px 0 4px;margin-top:8px;border-top:1px dashed var(--line)}
  .match-time .ko-lab{font-size:9px;font-weight:800;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-bottom:2px}
  .match-time .ko{font-weight:800;font-size:20px;letter-spacing:-0.02em;color:var(--ink);font-variant-numeric:tabular-nums}

  .match-foot{display:flex;justify-content:space-between;align-items:center;
    font-size:11px;color:var(--muted);margin-top:10px;padding-top:10px;border-top:1px solid var(--line);font-weight:500}
  .match-note{font-size:11.5px;color:var(--ink);margin-top:8px;font-weight:600;letter-spacing:-0.005em}
  .match-marks{display:inline-flex;gap:5px;align-items:center}
  .match-mark{width:8px;height:8px;border-radius:50%;display:inline-block}
  .match-mark.guest{background:#3b82f6}
  .match-mark.pundit{background:#ef4444}
  .match-mark.highlight{background:var(--yellow);box-shadow:0 0 0 1px #dcdd0c}

  .match-legend{display:flex;gap:18px;margin-top:18px;font-size:11.5px;color:var(--muted);align-items:center;flex-wrap:wrap}
  .match-legend .leg{display:flex;align-items:center;gap:7px;font-weight:500}

  .match-fade-in{animation:matchIn .4s ease backwards}
  @keyframes matchIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  .match-modal-head{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
    padding:24px 22px 22px;background:linear-gradient(180deg,#fff 0%,#fafaf6 100%);gap:18px;
    border-bottom:1px solid var(--line)}
  .match-modal-head>div{text-align:center}
  .match-modal-head .flag{font-size:50px;line-height:1;margin-bottom:8px}
  .match-modal-head .nm{font-weight:800;font-size:15px;letter-spacing:-0.01em;color:var(--ink)}
  .match-modal-head .ko-time{font-weight:800;font-size:28px;letter-spacing:-0.025em;color:var(--ink);font-variant-numeric:tabular-nums}
  .match-modal-head .ko-date{font-size:10.5px;font-weight:800;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-top:4px}

  .match-stage-row{padding:11px 22px;background:#fafaf6;border-bottom:1px solid var(--line);
    font-size:12px;color:var(--muted);display:flex;gap:10px;align-items:center;flex-wrap:wrap;letter-spacing:-0.005em}
  .match-stage-row b{color:var(--ink);font-weight:700}
  .match-stage-row .btn-link{background:var(--yellow);color:#0A0A0A;border:none;padding:7px 13px;
    border-radius:6px;font-family:inherit;font-weight:700;font-size:11px;cursor:pointer;
    margin-left:auto;letter-spacing:.02em;text-transform:uppercase}
  .match-stage-row .btn-link:hover{filter:brightness(1.05)}

  @media (max-width:540px){
    .match-team .flag{font-size:32px}
    .match-team .nm{font-size:12px}
    .nu-teams{font-size:14px}
    .nu-flag{font-size:22px}
    .nu-cd{font-size:20px}
    .match-modal-head .flag{font-size:40px}
    .match-modal-head .ko-time{font-size:22px}
  }

  /* ---------- meetings ---------- */
  .mtg-card{background:#fff;border:1px solid var(--line);border-radius:12px;
    padding:18px 22px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .mtg-h{display:flex;align-items:baseline;gap:14px;margin-bottom:10px;flex-wrap:wrap}
  .mtg-date{background:var(--yellow);color:#0A0A0A;font-weight:800;font-size:11px;
    letter-spacing:.08em;padding:4px 9px;border-radius:5px;text-transform:uppercase}
  .mtg-title{font-family:inherit;font-size:16px;font-weight:800;letter-spacing:-0.01em;
    text-transform:uppercase;color:var(--ink)}
  .mtg-by{font-size:11.5px;color:var(--muted);font-style:italic}
  .mtg-body{color:var(--ink);font-size:13.5px;line-height:1.6}
  .mtg-body p{margin:0 0 6px}
  .mtg-body ul{margin:6px 0 6px 18px;padding:0}
  .mtg-body li{margin-bottom:5px;list-style:disc}

  /* ---------- calendar view ---------- */
  .cal-toolbar{display:flex;align-items:center;gap:14px;margin-bottom:14px}
  .cal-toolbar h3{font-family:inherit;font-size:19px;font-weight:800;letter-spacing:-0.02em;text-transform:none;color:var(--ink)}
  .cal-nav{background:#fff;border:1px solid var(--line);border-radius:8px;width:34px;height:34px;
    font-size:20px;line-height:1;cursor:pointer;color:var(--ink)}
  .cal-nav:hover{background:#f5f5f0;border-color:#cfcfc9}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);
    border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .cal-h{background:#0A0A0A;color:#fff;font-weight:800;font-size:10px;letter-spacing:.14em;
    text-transform:uppercase;text-align:center;padding:9px 4px}
  .cal-day{background:#fff;min-height:128px;padding:8px;display:flex;flex-direction:column;gap:4px;position:relative}
  .cal-day.cal-out{background:#FAFAF6}
  .cal-day.cal-today{box-shadow:inset 0 0 0 2px var(--yellow)}
  .cal-num{font-weight:800;font-size:12.5px;color:var(--ink);line-height:1;margin-bottom:2px}
  .cal-day.cal-out .cal-num{color:#cfcfc9}
  .cal-ms{background:var(--yellow);color:#0A0A0A;font-weight:800;font-size:10.5px;
    padding:4px 7px;border-radius:5px;line-height:1.3}
  .cal-task{font-size:10.5px;padding:3px 7px;border-radius:5px;cursor:pointer;line-height:1.3;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
  .cal-task.done{background:#E6F6EC;color:#15A34A}
  .cal-task.prog{background:#E6EDFD;color:#2563EB}
  .cal-task.blk{background:#FBE9E9;color:#DC2626}
  .cal-task.idle{background:#F0F0EC;color:#555}
  .cal-task:hover{filter:brightness(.95)}
  .cal-match{font-size:10.5px;padding:3px 7px;border-radius:5px;cursor:pointer;line-height:1.3;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700;
    background:#E8F5EC;color:#15803D;border:1px solid #cce6d5}
  .cal-match:hover{filter:brightness(.97)}
  .cal-match small{font-weight:500;color:#15803D;opacity:.7;margin-left:3px}
  .leg-sw.leg-match{background:#E8F5EC;border:1px solid #cce6d5}
  .cal-more{font-size:10px;color:var(--muted);font-weight:700}
  .cal-meet{font-size:10px;color:var(--muted);font-style:italic}
  .cal-legend{display:flex;gap:18px;margin-top:14px;font-size:11.5px;color:var(--muted);align-items:center;flex-wrap:wrap}
  .cal-legend .leg{display:flex;align-items:center;gap:6px}
  .leg-sw{width:14px;height:14px;border-radius:3px;display:inline-block}
  .leg-sw.leg-ms{background:var(--yellow)}
  .leg-sw.leg-task{background:#E6EDFD}
  .leg-sw.leg-today{background:#fff;box-shadow:inset 0 0 0 2px var(--yellow)}
  @media (max-width:768px){
    .cal-day{min-height:78px;padding:5px}
    .cal-task,.cal-ms{font-size:9.5px;padding:2px 5px}
    .cal-num{font-size:11px}
  }

  /* ---------- AI assistant ---------- */
  .ai-fab{position:fixed;bottom:22px;right:22px;width:56px;height:56px;border-radius:50%;
    background:var(--yellow);color:#0A0A0A;border:none;box-shadow:0 8px 24px rgba(0,0,0,.18);
    cursor:pointer;z-index:90;display:none;align-items:center;justify-content:center}
  .ai-fab:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.24)}
  .ai-fab svg{width:24px;height:24px}
  body.ai-open .ai-fab{display:none}
  #ai-panel{position:fixed;right:0;top:0;bottom:0;width:430px;max-width:100vw;background:#fff;
    border-left:1px solid var(--line);z-index:200;display:none;flex-direction:column;
    box-shadow:-20px 0 60px rgba(0,0,0,.15)}
  #ai-panel.open{display:flex}
  .ai-h{background:#0A0A0A;color:#fff;padding:16px 20px;display:flex;align-items:center;gap:10px}
  .ai-h .ai-dot{width:8px;height:8px;border-radius:50%;background:var(--yellow);
    box-shadow:0 0 10px var(--yellow);flex-shrink:0}
  .ai-h h3{font-family:inherit;font-size:14px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;flex:1;color:#fff}
  .ai-h .x{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0 4px;line-height:1}
  .ai-body{flex:1;overflow-y:auto;display:flex;flex-direction:column}
  .ai-msg{margin-bottom:14px}
  .ai-msg.you{text-align:right}
  .ai-bub{display:inline-block;max-width:88%;padding:9px 13px;border-radius:12px;
    font-size:13.5px;line-height:1.5;white-space:pre-wrap;text-align:left;word-wrap:break-word}
  .ai-msg.you .ai-bub{background:#0A0A0A;color:#fff}
  .ai-msg.bot .ai-bub{background:#F0F0EC;color:#141414}
  .ai-msg.thinking .ai-bub{color:var(--muted);font-style:italic}
  .ai-actions{background:#FFFBE0;border:1px solid var(--yellow);border-radius:10px;
    padding:12px;margin-top:10px;font-size:12.5px;text-align:left}
  .ai-actions .ah{font-weight:800;font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    color:#0A0A0A;margin-bottom:8px}
  .ai-actions .act{padding:7px 0;border-bottom:1px solid rgba(0,0,0,.08);line-height:1.45}
  .ai-actions .act:last-of-type{border-bottom:none}
  .ai-actions .ak{font-weight:800;font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    background:#fff;padding:2px 6px;border-radius:3px;margin-right:6px;color:#0A0A0A}
  .ai-actions .btns{display:flex;gap:8px;margin-top:10px}
  .ai-applied{color:#15A34A;font-weight:800;font-size:11px;margin-top:8px;letter-spacing:.04em}
  .ai-input-row{padding:14px;border-top:1px solid var(--line);background:#FAFAF6;display:flex;gap:8px;flex-shrink:0;align-items:flex-end}
  .ai-input-row textarea{flex:1;border:1px solid var(--line);border-radius:10px;
    padding:13px 15px;font-family:inherit;font-size:14px;background:#fff;
    resize:none;min-height:56px;max-height:220px;line-height:1.5;overflow-y:auto;
    font-weight:500;letter-spacing:-0.005em}
  .ai-input-row textarea:focus{outline:2px solid var(--yellow);outline-offset:-1px}
  .ai-input-row button{background:#0A0A0A;color:var(--yellow);border:none;border-radius:10px;
    padding:0 18px;font-family:inherit;font-weight:800;font-size:12px;cursor:pointer;
    letter-spacing:.06em;text-transform:uppercase;height:56px;flex-shrink:0}
  .ai-hint{font-size:10px;color:var(--soft);padding:4px 14px 0;background:#FAFAF6;text-align:right;letter-spacing:.02em;font-weight:500}
  .ai-setup{padding:18px;border-bottom:1px solid var(--line)}
  .ai-setup h4{font-family:inherit;font-size:14px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;
    letter-spacing:.04em;margin-bottom:8px}
  .ai-setup p{font-size:12.5px;color:var(--muted);line-height:1.5;margin-bottom:12px}
  .ai-setup input{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px;
    font-family:inherit;font-size:12.5px;margin-bottom:10px;background:#fff}
  .ai-setup button{background:var(--yellow);border:none;border-radius:8px;padding:10px 14px;
    font-family:inherit;font-weight:800;cursor:pointer;font-size:11px;text-transform:uppercase;letter-spacing:.06em}
  .ai-examples{padding:16px 18px;border-bottom:1px solid var(--line);background:#FAFAF6}
  .ai-examples .lab{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
    color:var(--muted);margin-bottom:8px}
  .ai-ex{display:inline-block;background:#fff;border:1px solid var(--line);border-radius:14px;
    padding:5px 10px;font-size:11.5px;margin:0 4px 5px 0;cursor:pointer;color:#444;line-height:1.4}
  .ai-ex:hover{background:var(--yellow);border-color:var(--yellow);color:#000}
  #ai-chat{padding:18px;flex:1}
  .ai-foot{padding:10px 14px;border-top:1px solid var(--line);font-size:10.5px;color:var(--muted);
    background:#fff;display:flex;justify-content:space-between;align-items:center}
  .ai-foot a{color:var(--muted);cursor:pointer;text-decoration:underline}
  @media (max-width:540px){ #ai-panel{width:100%} }

  /* ---------- modal ---------- */
  .ovl{position:fixed;inset:0;background:rgba(10,10,10,.55);backdrop-filter:blur(3px);
    display:flex;align-items:center;justify-content:center;z-index:100;padding:24px;animation:fade .15s}
  @keyframes fade{from{opacity:0}}
  .modal{background:var(--card);border-radius:16px;width:560px;max-width:100%;max-height:90vh;
    overflow-y:auto;box-shadow:var(--shadow-lg);animation:pop .18s}
  @keyframes pop{from{transform:translateY(12px) scale(.98);opacity:0}}
  .modal-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .modal-h h2{font-family:inherit;font-size:17px;font-weight:800;letter-spacing:-0.015em;flex:1;text-transform:none}
  .modal-h .x{border:none;background:var(--bg);width:30px;height:30px;border-radius:8px;cursor:pointer;
    font-size:17px;color:var(--muted);font-weight:700}
  .modal-h .x:hover{background:#ececec}
  .modal-b{padding:22px 24px;display:flex;flex-direction:column;gap:17px}
  .fld label{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:var(--muted);display:block;margin-bottom:7px}
  .fld input,.fld select,.fld textarea{
    width:100%;font-family:inherit;font-size:14px;font-weight:500;padding:11px 13px;
    border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);
    transition:border-color .12s,box-shadow .12s;letter-spacing:-0.005em;
  }
  .fld input:hover,.fld select:hover,.fld textarea:hover{border-color:#bcbcb5}
  .fld textarea{resize:vertical;min-height:78px;line-height:1.55}
  .fld input:focus,.fld select:focus,.fld textarea:focus{
    outline:none;border-color:var(--black);box-shadow:0 0 0 3px rgba(248,250,15,.55)}
  .fld .hint{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.4;font-weight:500}
  .fld .hint b{font-weight:700;color:var(--ink)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .wscheck{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .wscheck label{display:flex;gap:7px;align-items:center;font-size:12px;font-weight:600;
    text-transform:none;letter-spacing:0;color:var(--ink);cursor:pointer;padding:6px 8px;
    border:1px solid var(--line);border-radius:7px}
  .wscheck input{width:auto}
  .modal-f{padding:15px 22px;border-top:1px solid var(--line);display:flex;gap:9px;align-items:center}
  .modal-f .sp{flex:1}

  /* ---------- misc ---------- */
  .empty{text-align:center;padding:54px 20px;color:var(--soft)}
  .empty .big{font-family:inherit;font-size:18px;font-weight:800;color:var(--ink);text-transform:none;letter-spacing:-0.01em}
  .empty p{font-size:13px;margin-top:6px}
  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);
    background:var(--black);color:#fff;padding:11px 20px;border-radius:10px;font-weight:700;font-size:13px;
    z-index:200;transition:.25s;display:flex;gap:9px;align-items:center;box-shadow:var(--shadow-lg)}
  #toast.show{transform:translateX(-50%) translateY(0)}
  #toast .tk{width:7px;height:7px;border-radius:50%;background:var(--yellow)}
  .banner{background:#FFF6CC;border:1px solid #E9DD8A;color:#7a6a12;font-size:12px;font-weight:600;
    padding:9px 16px;text-align:center}
  .fadeup{animation:fu .4s both}
  @keyframes fu{from{opacity:0;transform:translateY(10px)}}

  @media(max-width:1080px){
    .stats{grid-template-columns:repeat(3,1fr)}
    .ov-grid{grid-template-columns:1fr}
    .board,.ideas-board{grid-template-columns:repeat(2,1fr)}
    .m-stats{grid-template-columns:repeat(5,1fr)}
  }
  @media(max-width:720px){
    #app{flex-direction:column}
    .sidebar{width:100%;height:auto;position:sticky;top:0;z-index:30;
      flex-direction:row;flex-wrap:wrap;align-items:center}
    .brand{padding:12px 16px;flex:1}
    .brand .logo-img{width:128px}
    .brand .tag{margin-top:5px;font-size:9px}
    .stripe{display:none}
    .nav{display:flex;padding:6px;flex:1 1 100%;order:3;gap:3px;
      overflow-x:auto;-webkit-overflow-scrolling:touch}
    .nav-label{display:none}
    .nav-item{width:auto;flex:1 0 auto;justify-content:center;font-size:11.5px;padding:9px 11px;white-space:nowrap}
    .nav-item.active::before{display:none}
    .nav-item .cnt{display:none}
    .who{border-top:none;padding:8px 14px;order:2}
    .who label{display:none}
    .who .hint{display:none}
    .who select{padding:7px 9px;font-size:12px}
    .topbar{padding:14px 16px 12px;gap:10px}
    .topbar h1{font-size:23px}
    .topbar .sub{font-size:11.5px}
    .view{padding:16px}
    .stats{grid-template-columns:repeat(2,1fr);gap:10px}
    .stat .v{font-size:34px}
    .board,.ideas-board{grid-template-columns:1fr}
    .toolbar input[type=text]{max-width:none;min-width:0;width:100%;flex:1 1 100%}
    .toolbar select{flex:1}
    .team-grid{grid-template-columns:1fr}
    .asset-grid{grid-template-columns:1fr}
    .m-doc{padding:22px 18px}
    .m-head{flex-direction:column;align-items:flex-start;gap:6px}
    .m-head h1{font-size:26px}
    .m-date{text-align:left}
    .m-stats{grid-template-columns:repeat(3,1fr)}
    .modal{border-radius:14px}
    .row2{grid-template-columns:1fr}
    .wscheck{grid-template-columns:1fr}
    .ws-row .nm{width:auto;flex:1}
    .ws-row{flex-wrap:wrap}
    .task{flex-wrap:wrap}
    .task .rt{margin-left:42px}
  }
</style>
</head>
<body>
<div id="app">

/* migrate older saved data to the current shape */
function migrate(d){
  if(!d.assets) d.assets = seedAssets();
  if(!d.log) d.log = [];
  if((d.v||1) < 2){
    const fresh = seed();
    const have = new Set(d.tasks.map(t=>t.title));
    fresh.tasks.forEach(t=>{ if(!have.has(t.title)) d.tasks.push(t); });
  }
  if((d.v||1) < 3){ d.v = 3; }
  return d;
}

async function loadData(){
  const [tk,tm,id,as,mt,mx,iv,ac] = await Promise.all([

    sb.from('invoices').select('*').order('created_at',{ascending:false}),

  ]);
  let d = {tasks:tk.data||[], team:tm.data||[], ideas:id.data||[], assets:as.data||[],
    meetings:mt.data||[], matches:mx.data||[], invoices:iv.data||[], log:ac.data||[]};
  if(!d.tasks.length){
    const s = seed();
    d = {tasks:s.tasks, team:s.team, ideas:s.ideas, assets:s.assets, meetings:[], matches:[], invoices:[], log:[]};
    await Promise.all([
      sb.from('tasks').upsert(d.tasks.map((r,i)=>({...pick(r,COLS.tasks),sort:i}))),
      sb.from('team').upsert(d.team.map((r,i)=>({...pick(r,COLS.team),sort:i}))),
      sb.from('ideas').upsert(d.ideas.map((r,i)=>({...pick(r,COLS.ideas),sort:i}))),
      sb.from('assets').upsert(d.assets.map((r,i)=>({...pick(r,COLS.assets),sort:i})))
    ]);
  }
  return d;
}

let saveBusy=false, saveAgain=false;
async function saveData(){
  if(!DATA || !sb) return;
  if(saveBusy){ saveAgain=true; return; }
  saveBusy=true;
  try{
    await Promise.all([
      syncTable('tasks',DATA.tasks,COLS.tasks,true),
      syncTable('team',DATA.team,COLS.team,true),
      syncTable('ideas',DATA.ideas,COLS.ideas,true),
      syncTable('assets',DATA.assets,COLS.assets,true),
      syncTable('meetings',DATA.meetings||[],COLS.meetings,true),
      syncTable('matches',DATA.matches||[],COLS.matches,true),
      syncTable('invoices',DATA.invoices||[],COLS.invoices,true),
      syncTable('activity',DATA.log,COLS.activity,false)
    ]);
    flash('Saved');
  }catch(e){ console.warn('save failed',e); flash('Save failed — check connection'); }
  saveBusy=false;
  if(saveAgain){ saveAgain=false; saveData(); }
}
async function syncTable(name,arr,keys,ordered){
  const rows = arr.map((r,i)=> ordered ? {...pick(r,keys),sort:i} : pick(r,keys));
  if(rows.length){
    const {error} = await sb.from(name).upsert(rows);
    if(error) throw error;
  }
  const ids = arr.map(r=>r.id);
  let q = sb.from(name).delete();
  q = ids.length ? q.not('id','in','('+ids.join(',')+')') : q.not('id','is',null);
  const {error} = await q;
  if(error) throw error;
}

async function doAuth(){
  const email=$('#lg-email').value.trim(), pass=$('#lg-pass').value, err=$('#lg-err');
  err.textContent=''; err.classList.remove('ok');
  if(!email||!pass){ err.textContent='Enter your email and password.'; return; }
  if(authMode==='up' && pass.length<6){ err.textContent='Password must be at least 6 characters.'; return; }
  $('#lg-submit').disabled=true;
  try{
    if(authMode==='up'){
      const name=$('#lg-name').value.trim();
      if(!name){ err.textContent='Enter your name.'; $('#lg-submit').disabled=false; return; }
      const {data,error}=await sb.auth.signUp({email,password:pass,options:{data:{name}}});
      if(error) throw error;
      if(!data.session){
        err.classList.add('ok');
        err.textContent='Account created. Check your email to confirm, then sign in.';
        authMode='in';
        $('#lg-name-wrap').style.display='none';
        $('#lg-title').textContent='Sign in';
        $('#lg-submit').textContent='Sign in';
        $('#lg-toggle').innerHTML='Need an account? <b>Sign up</b>';
      }
    } else {
      const {error}=await sb.auth.signInWithPassword({email,password:pass});
      if(error) throw error;
    }
  }catch(e){ err.textContent = (e&&e.message) ? e.message : 'Something went wrong. Try again.'; }
  $('#lg-submit').disabled=false;
}

function timeAgo(ts){
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60) return 'just now';
  const m=Math.floor(s/60); if(m<60) return m+'m ago';
  const h=Math.floor(m/60); if(h<24) return h+'h ago';
  const d=Math.floor(h/24); if(d<7) return d+'d ago';
  return new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}

/* ============================ TASKS ============================ */
function filteredTasks(){
  const f=state.filters;
  return DATA.tasks.filter(t=>{
    if(f.ws && t.ws!==f.ws) return false;
    if(f.owner && t.owner!==f.owner) return false;
    if(f.status && t.status!==f.status) return false;
    if(f.prio && t.prio!==f.prio) return false;
    if(f.mine && t.owner!==me()) return false;
    if(f.q){ const q=f.q.toLowerCase();
      if(!(t.title.toLowerCase().includes(q)||(t.notes||'').toLowerCase().includes(q))) return false; }
    return true;
  });
}
function renderTasks(){
  const f=state.filters;
  const opt=(arr,val,blank)=>`<option value="">${blank}</option>`+
    arr.map(a=>`<option value="${esc(a)}" ${val===a?'selected':''}>${esc(a)}</option>`).join('');
  const wsOpt=`<option value="">All workstreams</option>`+
    WS.map(w=>`<option value="${w.id}" ${f.ws===w.id?'selected':''}>${esc(w.name)}</option>`).join('');
  const toolbar=`<div class="toolbar">
    <input type="text" placeholder="Search tasks…" value="${esc(f.q)}" oninput="setF('q',this.value)">
    <select onchange="setF('ws',this.value)">${wsOpt}</select>
    <select onchange="setF('owner',this.value)">${opt(DATA.team.map(p=>p.name),f.owner,'All owners')}</select>
    <select onchange="setF('status',this.value)">${opt(STATUSES,f.status,'Any status')}</select>
    <select onchange="setF('prio',this.value)">${opt(PRIOS,f.prio,'Any priority')}</select>
    <button class="chip ${f.mine?'on':''}" onclick="toggleMine()">My Work</button>
    <div class="seg">
      <button class="${state.taskView==='list'?'on':''}" onclick="setTV('list')">List</button>
      <button class="${state.taskView==='board'?'on':''}" onclick="setTV('board')">Board</button>
    </div>
  </div>`;

  const ts=filteredTasks();
  if(!ts.length) return toolbar+`<div class="empty"><div class="big">No tasks match</div>
    <p>Adjust the filters, or add a new task.</p></div>`;

  if(state.taskView==='board') return toolbar+renderBoard(ts);

  // grouped list
  let html='';
  WS.forEach(w=>{
    const wt=ts.filter(t=>t.ws===w.id);
    if(!wt.length) return;
    const p=wsProgress(w.id);
    const col=state.collapsed[w.id]?'collapsed':'';
    html+=`<div class="ws-group ${col}">
      <div class="ws-group-h" onclick="toggleWs('${w.id}')">
        <h3>${esc(w.name)}</h3>
        <span class="ld">${esc((w.leads||[]).join(", "))}</span>
        <div class="mini"><i style="width:${p.pct}%"></i></div>
        <span class="gf">${wt.length} shown</span>
        <span class="chev">${IC.chev}</span>
      </div>
      <div class="tasklist">${wt.map(taskRow).join('')}</div>
    </div>`;
  });
  return toolbar+html;
}
function taskRow(t){
  return `<div class="task p-${PR_CLASS[t.prio]}" onclick="openTask('${t.id}')">
    <span class="pill ${ST_CLASS[t.status]}">
      <span class="dot"></span>${t.status}</span>

function renderBoard(ts){
  const cols=STATUSES.map(s=>{
    const ct=ts.filter(t=>t.status===s);
    const cards=ct.map(t=>`
      <div class="tcard p-${PR_CLASS[t.prio]}" draggable="true" data-id="${t.id}"
           ondragstart="dragStart(event)" ondragend="dragEnd(event)" onclick="openTask('${t.id}')">
        <div class="tt">${esc(t.title)}</div>
        <div class="mt">
          <span class="wstag">${esc(wsName(t.ws))}</span>
          <span class="prio ${PR_CLASS[t.prio]}">${t.prio}</span>
          <span style="margin-left:auto;display:flex;align-items:center;gap:6px">
            ${t.due?`<span class="due ${isOverdue(t)?'over':''}" style="font-size:10.5px">${fmtDate(t.due)}</span>`:''}
            ${personLink(t.owner, avatar(t.owner,'sm'))}</span>
        </div>
      </div>`).join('') || `<div style="padding:14px;text-align:center;color:var(--soft);font-size:12px">Drop here</div>`;
    return `<div class="col" data-status="${s}" ondragover="dragOver(event)"
                 ondragleave="dragLeave(event)" ondrop="drop(event)">
      <div class="col-h"><span class="pill ${ST_CLASS[s]}"><span class="dot"></span></span>${s}
        <span class="ct">${ct.length}</span></div>
      <div class="col-body">${cards}</div>
    </div>`;
  }).join('');
  return `<div class="board">${cols}</div>`;
}
let dragId=null;
function dragStart(e){ dragId=e.target.dataset.id; e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed='move'; }
function dragEnd(e){ e.target.classList.remove('dragging'); }
function dragOver(e){ e.preventDefault(); e.currentTarget.classList.add('drop'); }
function dragLeave(e){ e.currentTarget.classList.remove('drop'); }
function drop(e){
  e.preventDefault(); e.currentTarget.classList.remove('drop');
  const st=e.currentTarget.dataset.status;
  const t=DATA.tasks.find(x=>x.id===dragId);
  if(t&&t.status!==st){ t.status=st; logActivity('moved task to '+st,t.title); saveData(); render(); }
}
function setF(k,v){ state.filters[k]=v;
  if(k==='q'){ // debounce-ish: re-render without losing focus
    clearTimeout(setF._t); setF._t=setTimeout(()=>{render(); const i=document.querySelector('.toolbar input');
      if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length);}},220); return; }
  render();
}
function toggleMine(){ state.filters.mine=!state.filters.mine; render(); }
function setTV(v){ state.taskView=v; render(); }
function toggleWs(id){ state.collapsed[id]=!state.collapsed[id]; render(); }
function cycleStatus(id){
  const t=DATA.tasks.find(x=>x.id===id);
  t.status=STATUSES[(STATUSES.indexOf(t.status)+1)%STATUSES.length];
  logActivity('moved task to '+t.status,t.title);
  saveData(); render();
}

function deadlineRow(t){

      <span class="dot"></span>${t.status}</span>

      <span class="prio ${PR_CLASS[t.prio]}">${t.prio}</span>
      ${personLink(t.owner, avatar(t.owner))}</div>
  </div>`;

function renderDeadlines(){
  const open=DATA.tasks.filter(t=>t.status!=='Done');
  const b={overdue:[],week:[],next:[],later:[],none:[]};
  open.forEach(t=>{
    if(!t.due){ b.none.push(t); return; }
    const d=daysUntil(t.due);
    if(d<0) b.overdue.push(t);
    else if(d<=7) b.week.push(t);
    else if(d<=14) b.next.push(t);
    else b.later.push(t);
  });
  const byDue=(x,y)=>(x.due||'9999').localeCompare(y.due||'9999');
  Object.values(b).forEach(a=>a.sort(byDue));
  const sec=(list,label,tone)=> list.length?`
    <div class="panel" style="margin-bottom:16px">
      <div class="panel-h ${tone}">${tone==='danger'?IC.bolt:IC.clock}<h3>${label}</h3>
        <span class="badge">${list.length}</span></div>
      <div>${list.map(deadlineRow).join('')}</div>
    </div>`:'';
  let html='';
  html+=sec(b.overdue,'Overdue','danger');
  html+=sec(b.week,'This Week','');
  html+=sec(b.next,'Next Week','');
  html+=sec(b.later,'Later','');
  html+=sec(b.none,'No Date Set','');
  if(!html) html=`<div class="empty"><div class="big">Nothing scheduled</div>
    <p>Add due dates to tasks and they will show here.</p></div>`;
  return html;
}

/* ============================ MEETING MODE ============================ */
function renderMeeting(){
  const T=DATA.tasks;
  const done=T.filter(t=>t.status==='Done').length;
  const prog=T.filter(t=>t.status==='In Progress').length;
  const blocked=T.filter(t=>t.status==='Blocked');
  const pct=T.length?Math.round(done/T.length*100):0;
  const dueWk=T.filter(t=>t.status!=='Done'&&t.due&&daysUntil(t.due)>=0&&daysUntil(t.due)<=7)
    .sort((a,b)=>(a.due||'').localeCompare(b.due||''));
  const overdue=T.filter(t=>isOverdue(t)).sort((a,b)=>(a.due||'').localeCompare(b.due||''));
  const recent=(DATA.log||[]).slice(0,12);
  const today=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  const wsTable=WS.map(w=>{
    const p=wsProgress(w.id);
    return `<tr><td>${esc(w.name)}</td><td style="color:var(--muted)">${esc((w.leads||[]).join(", "))}</td>
      <td style="text-align:center">${p.done}/${p.total}</td>

    : `<div class="m-empty">${empty}</div>`;

  return `<div class="meeting">
    <div class="m-actions no-print">
      <button class="btn btn-ghost" onclick="go('overview')">Back</button>
      <div class="sp" style="flex:1"></div>
      <button class="btn btn-primary" onclick="window.print()">${IC.print}Print or Save as PDF</button>

    <div class="m-doc">
      <div class="m-head">
        <div><div class="m-kicker">FANZONE Ibiza · Weekly Meeting</div>
          <h1 class="display">Project Status</h1></div>
        <div class="m-date">${today}</div>
      </div>
      <div class="m-stats">
        <div class="m-stat"><b>${pct}%</b><span>Complete</span></div>
        <div class="m-stat"><b>${done}</b><span>Done</span></div>
        <div class="m-stat"><b>${prog}</b><span>In Progress</span></div>
        <div class="m-stat"><b>${blocked.length}</b><span>Blocked</span></div>
        <div class="m-stat"><b>${T.length}</b><span>Total Tasks</span></div>
      </div>
      <h2 class="m-h2">Workstream Progress</h2>
      <table class="m-table"><tbody>${wsTable}</tbody></table>
      <h2 class="m-h2">Blocked — needs the room</h2>
      ${mList(blocked,'Nothing blocked.')}
      <h2 class="m-h2">Overdue</h2>
      ${mList(overdue,'Nothing overdue.')}
      <h2 class="m-h2">Due this week</h2>
      ${mList(dueWk,'Nothing due in the next seven days.')}
      <h2 class="m-h2">Recent activity</h2>
      ${recent.length?recent.map(e=>`<div class="m-act"><b>${esc(e.who)}</b> ${esc(e.action)}

  </div>`;

function addComment(id){

  const t=DATA.tasks.find(x=>x.id===id);

function saveTask(id){
  const title=$('#m-title').value.trim();
  if(!title){ flash('Give the task a title'); return; }
  const ws=$('#m-ws').value;
  const obj={ws,title,owner:$('#m-owner').value,prio:$('#m-prio').value,
    status:$('#m-status').value,due:$('#m-due').value,notes:$('#m-notes').value.trim()};
  if(id){
    const t=DATA.tasks.find(t=>t.id===id);
    const before={status:t.status,owner:t.owner};
    Object.assign(t,obj);
    if(before.status!==obj.status) logActivity('moved task to '+obj.status,title);
    else if(before.owner!==obj.owner) logActivity('reassigned a task to '+obj.owner,title);
    else logActivity('edited task',title);
  }
  else{
    const n=DATA.tasks.filter(t=>t.ws===ws).length+1;
    DATA.tasks.push({id:uid(),code:ws.slice(0,3).toUpperCase()+'-'+String(n).padStart(2,'0'),...obj});
    logActivity('created task',title);
  }
  saveData(); closeModal(); render();
}

  DATA.tasks=DATA.tasks.filter(t=>t.id!==id);

/* ============================ CALENDAR VIEW ============================ */
let CAL_MONTH = (function(){ const d=new Date(); return new Date(d.getFullYear(),d.getMonth(),1); })();
function calMove(n){ CAL_MONTH = new Date(CAL_MONTH.getFullYear(), CAL_MONTH.getMonth()+n, 1); render(); }
function calToday(){ const d=new Date(); CAL_MONTH = new Date(d.getFullYear(),d.getMonth(),1); render(); }
function renderCalendar(){
  const M = CAL_MONTH;
  const monthStart = new Date(M.getFullYear(), M.getMonth(), 1);
  const monthEnd = new Date(M.getFullYear(), M.getMonth()+1, 0);
  const firstWeekday = (monthStart.getDay()+6)%7;
  const daysInMonth = monthEnd.getDate();
  const totalCells = Math.ceil((firstWeekday + daysInMonth)/7) * 7;
  const byDay = {};
  DATA.tasks.forEach(t=>{ if(t.due){ (byDay[t.due]=byDay[t.due]||[]).push(t); } });
  const matchesByDay = {};
  (DATA.matches||[]).forEach(m=>{ if(m.date){ (matchesByDay[m.date]=matchesByDay[m.date]||[]).push(m); } });
  const msByDay = Object.fromEntries(MILESTONES.map(m=>[m.d, m.label]));
  const todayIso = todayISO();
  let cells = '';
  for(let i=0;i<totalCells;i++){
    const dayNum = i - firstWeekday + 1;
    const inMonth = dayNum>=1 && dayNum<=daysInMonth;
    if(!inMonth){ cells += `<div class="cal-day cal-out"></div>`; continue; }
    const d = new Date(M.getFullYear(), M.getMonth(), dayNum);
    const iso = d.toISOString().slice(0,10);
    const isToday = iso === todayIso;
    const isFriday = d.getDay() === 5;
    const ms = msByDay[iso];
    const tasks = byDay[iso] || [];
    const matches = matchesByDay[iso] || [];
    let items = '';
    if(ms) items += `<div class="cal-ms">${esc(ms)}</div>`;
    matches.forEach(m=>{
      items += `<div class="cal-match" onclick="event.stopPropagation();openMatch('${m.id}')" title="${esc(m.team_a)} vs ${esc(m.team_b)}">${flagOf(m.team_a)} v ${flagOf(m.team_b)} <small>${esc(m.kickoff||'')}</small></div>`;
    });
    tasks.slice(0,2).forEach(t=>{
      const cls = t.status==='Done'?'done':t.status==='In Progress'?'prog':t.status==='Blocked'?'blk':'idle';
      items += `<div class="cal-task ${cls}" onclick="event.stopPropagation();openTask('${t.id}')" title="${esc(t.title)}">${esc(t.title)}</div>`;
    });
    if(tasks.length>2) items += `<div class="cal-more">+${tasks.length-2} more</div>`;
    if(isFriday && !ms && tasks.length===0 && matches.length===0) items += `<div class="cal-meet">Weekly meeting</div>`;
    cells += `<div class="cal-day ${isToday?'cal-today':''}"><div class="cal-num">${dayNum}</div>${items}</div>`;
  }
  const monthName = M.toLocaleString('en',{month:'long',year:'numeric'});
  return `<div class="cal-toolbar">
    <button class="cal-nav" onclick="calMove(-1)">‹</button>
    <h3>${esc(monthName)}</h3>
    <button class="cal-nav" onclick="calMove(1)">›</button>
  </div>
  <div class="cal-grid">
    ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>`<div class="cal-h">${d}</div>`).join('')}
    ${cells}
  </div>
  <div class="cal-legend">
    <span class="leg"><span class="leg-sw leg-ms"></span>Milestone</span>
    <span class="leg"><span class="leg-sw leg-match"></span>Match</span>
    <span class="leg"><span class="leg-sw leg-task"></span>Task deadline</span>
    <span class="leg"><span class="leg-sw leg-today"></span>Today</span>
    <span class="leg" style="margin-left:auto;color:var(--soft);font-style:italic">Tap a chip to open</span>
  </div>`;
}

function renderMeetings(){
  const list = [...(DATA.meetings||[])].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  if(!list.length) return `<div class="empty"><div class="big">No recaps yet</div>
    <p>Capture what was discussed each week — bullets, decisions, anything worth keeping.</p>
    <button class="btn btn-primary" onclick="openMeeting('')">${IC.plus}Add Recap</button></div>`;
  return list.map(m=>{
    const lines = (m.notes||'').split('\n').map(l=>l.trimEnd());
    const body = lines.map(l=>{
      if(!l.trim()) return '';
      if(/^[-*•]\s+/.test(l)) return `<li>${esc(l.replace(/^[-*•]\s+/,''))}</li>`;
      return `<p>${esc(l)}</p>`;
    }).join('');
    const html = body.includes('<li>') ?
      body.replace(/(<li>.*?<\/li>(?:\s*<li>.*?<\/li>)*)/gs, '<ul>$1</ul>') : body;
    const d = m.date ? new Date(m.date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '';
    return `<div class="mtg-card">
      <div class="mtg-h">
        <div class="mtg-date">${esc(d)}</div>
        <div class="mtg-title">${esc(m.title||'Meeting recap')}</div>
        <div class="mtg-by">by ${esc(m.by||'—')}</div>
        <div style="flex:1"></div>
        <button class="btn btn-ghost btn-sm" onclick="openMeeting('${m.id}')">Edit</button>
        <button class="btn btn-ghost btn-sm" onclick="deleteMeeting('${m.id}')" style="color:#DC2626">Delete</button>
      </div>
      <div class="mtg-body">${html||'<p style="color:var(--muted);font-style:italic">No notes</p>'}</div>
    </div>`;
  }).join('');
}
