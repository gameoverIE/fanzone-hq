async function saveInvoice(id){
  const inv = id ? (DATA.invoices||[]).find(x=>x.id===id) : null;
  const data = inv || {id: uid(), created_at: new Date().toISOString(), submitted_by: me(), status:'Pending'};
  data.supplier = $('#inv-sup').value.trim();
  data.amount = parseFloat($('#inv-amt').value) || 0;
  data.currency = $('#inv-ccy').value;
  data.description = $('#inv-desc').value.trim();
  data.ws = $('#inv-ws').value;
  data.due_date = $('#inv-due').value;
  data.notes = $('#inv-notes').value;
  if(!data.supplier && !data.amount){ flash('Add a supplier or amount first'); return; }

  // File upload if one selected
  const fileInput = $('#inv-file');
  if(fileInput && fileInput.files && fileInput.files[0]){
    const file = fileInput.files[0];
    if(file.size > 10*1024*1024){ flash('File too large (max 10MB)'); return; }
    const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    const path = `${data.id}/${Date.now()}-${safeName}`;
    const btn = $('#inv-save-btn'); if(btn){ btn.disabled=true; btn.textContent='Uploading…'; }
    try{
      const {error} = await sb.storage.from('invoices').upload(path, file, {upsert:false, contentType: file.type});
      if(error) throw error;
      data.file_path = path;
      data.file_name = file.name;
    }catch(e){
      console.error(e);
      flash('Upload failed: '+(e.message||'unknown')); 
      if(btn){ btn.disabled=false; btn.textContent='Save'; }
      return;
    }
  }

  if(!inv){
    DATA.invoices = DATA.invoices || [];
    DATA.invoices.unshift(data);
    logActivity('added invoice', `${data.supplier} · €${data.amount}`);
  } else {
    logActivity('updated invoice', `${inv.supplier}`);
  }
  saveData(); closeModal(); render();
}

async function viewInvoiceFile(path){
  if(!path) return flash('No file attached');
  try{
    const {data, error} = await sb.storage.from('invoices').createSignedUrl(path, 3600);
    if(error) throw error;
    window.open(data.signedUrl, '_blank');
  }catch(e){ flash('Could not open: '+(e.message||'unknown')); }
}

function changeInvoiceStatus(id, status){
  const inv = (DATA.invoices||[]).find(x=>x.id===id);
  if(!inv) return;
  const prev = inv.status;
  inv.status = status;
  if(status==='Paid' && !inv.paid_at) inv.paid_at = new Date().toISOString();
  if(status==='Approved' && !inv.approved_by) inv.approved_by = me();
  if(status==='Pending'){ inv.approved_by = null; inv.paid_at = null; }
  logActivity('moved invoice to '+status, `${inv.supplier}`);
  saveData(); 
  closeModal(); 
  render();
  setTimeout(()=>openInvoice(id), 50);
}

async function deleteInvoice(id){
  if(!confirm('Delete this invoice and its uploaded file?')) return;
  const i = (DATA.invoices||[]).findIndex(x=>x.id===id);
  if(i>=0){
    const inv = DATA.invoices[i];
    if(inv.file_path){
      try { await sb.storage.from('invoices').remove([inv.file_path]); } catch(e){}
    }
    DATA.invoices.splice(i,1);
    logActivity('deleted invoice', inv.supplier);
    saveData(); closeModal(); render();
  }
}

function fmtTs(ts){
  if(!ts) return '';
  const d = new Date(ts), now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  const yest = new Date(now); yest.setDate(yest.getDate()-1);
  const isYest = d.toDateString() === yest.toDateString();
  const time = d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  if(sameDay) return `Today ${time}`;
  if(isYest) return `Yesterday ${time}`;
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'}) + ' ' + time;
}

/* ============================ TIMELINE ============================ */
let TL_FILTER = 'all';
function setTLFilter(s){ TL_FILTER = s; render(); }

function tlBucket(action){
  const a = (action||'').toLowerCase();
  if(a.includes('task')) return 'tasks';
  if(a.includes('idea')) return 'ideas';
  if(a.includes('meeting')) return 'meetings';
  if(a.includes('match')) return 'matches';
  if(a.includes('comment') || a.includes('member') || a.includes('person')) return 'people';
  return 'other';
}
function tlIconFor(bucket){
  return {tasks:IC.check, ideas:IC.bulb, meetings:IC.notebook, matches:IC.football, people:IC.users, other:IC.clock}[bucket]||IC.clock;
}

function renderTimeline(){
  const entries = [...(DATA.log||[])].sort((a,b)=>(b.ts||0)-(a.ts||0));
  if(!entries.length) return `<div class="empty"><div class="big">Nothing logged yet</div>
    <p>Activity from across the project will show up here as it happens.</p></div>`;

  const counts = {all: entries.length, tasks:0, ideas:0, meetings:0, matches:0, people:0, other:0};
  entries.forEach(e => { counts[tlBucket(e.action)]++; });
  const cats = [['all','All'],['tasks','Tasks'],['ideas','Ideas'],['meetings','Meetings'],['matches','Matches'],['people','People']];
  const chips = `<div class="tl-filters">${cats.map(([k,l])=>
    counts[k]>0 || k==='all' ? `<button class="match-chip ${TL_FILTER===k?'on':''}" onclick="setTLFilter('${k}')">${l} <span class="ct">${counts[k]}</span></button>` : ''
  ).join('')}</div>`;

  const filtered = TL_FILTER==='all' ? entries : entries.filter(e=>tlBucket(e.action)===TL_FILTER);

  // group by day
  const groups = {};
  const order = [];
  filtered.forEach(e=>{
    const d = new Date(e.ts);
    const key = d.toDateString();
    if(!groups[key]){ groups[key] = []; order.push(key); }
    groups[key].push(e);
  });

  const now = new Date();
  const todayKey = now.toDateString();
  const yest = new Date(now); yest.setDate(yest.getDate()-1);
  const yestKey = yest.toDateString();
  const dayLabel = key => {
    if(key===todayKey) return 'Today';
    if(key===yestKey) return 'Yesterday';
    const d = new Date(key);
    return d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  };

  const body = order.map(key=>{
    const day = groups[key];
    const rows = day.map(e=>{
      const bucket = tlBucket(e.action);
      const time = new Date(e.ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      const whoLink = personLink(e.who, `<span class="who">${esc(e.who)}</span>`);
      return `<div class="tl-row tl-${bucket}">
        <div class="tl-dot">${tlIconFor(bucket)}</div>
        <div class="tl-content">
          <div class="tl-line">${whoLink} <span class="ax">${esc(e.action||'')}</span>${e.detail?` <span class="det">${esc(e.detail)}</span>`:''}</div>
          <div class="tl-time">${time}</div>
        </div>
      </div>`;
    }).join('');
    return `<div class="tl-day-h">${dayLabel(key)}</div><div class="tl-stream">${rows}</div>`;
  }).join('');

  return chips + (body || '<div class="empty"><p>No activity for this filter.</p></div>');
}

/* ============================ MATCHES ============================ */
let MATCH_FILTER = 'all';
let MATCH_TICK = null;

function matchDateTime(m){
  if(!m.date) return null;
  const [y,mo,d] = m.date.split('-').map(Number);
  if(!m.kickoff) return new Date(y, mo-1, d, 21, 0);
  const [h,mn] = m.kickoff.split(':').map(Number);
  let day = d;
  if(h < 5) day = d + 1;
  return new Date(y, mo-1, day, h, mn);
}
function isMatchLive(m){
  const ko = matchDateTime(m);
  if(!ko) return false;
  const now = Date.now();
  return now >= ko.getTime() && now <= ko.getTime() + 2.5*60*60*1000;
}
function nextMatchObj(){
  const now = Date.now();
  return (DATA.matches||[])
    .filter(m => m.status !== 'Optional')
    .map(m => ({m, t: matchDateTime(m)}))
    .filter(x => x.t && x.t.getTime() > now)
    .sort((a,b) => a.t - b.t)[0];
}
function countdownText(target){
  const ms = target - Date.now();
  if(ms < 0) return 'kicking off';
  const days = Math.floor(ms / 86400000);
  const hours = Math.floor((ms % 86400000) / 3600000);
  const mins = Math.floor((ms % 3600000) / 60000);
  if(days >= 1) return `${days}d ${hours}h`;
  if(hours >= 1) return `${hours}h ${mins}m`;
  return `${mins}m`;
}
function gotoMatchDate(date){
  if(!date) return;
  const [y,mo] = date.split('-').map(Number);
  CAL_MONTH = new Date(y, mo-1, 1);
  closeModal();
  state.view = 'calendar';
  render();
}
function setMatchFilter(s){ MATCH_FILTER = s; render(); }

function fmtMatchDate(iso){
  if(!iso) return '';
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}).toUpperCase();
}

function renderMatches(){
  const all = [...(DATA.matches||[])].sort((a,b)=>(a.sort||0)-(b.sort||0));
  if(!all.length) return `<div class="empty"><div class="big">No matches yet</div>
    <p>Match schedule will appear here once it is added.</p></div>`;

  // Filter chips
  const counts = {all: all.length};
  STAGE_ORDER.forEach(s=>{ counts[s] = all.filter(m=>m.stage===s).length; });
  const chips = `<div class="match-filters">
    <button class="match-chip ${MATCH_FILTER==='all'?'on':''}" onclick="setMatchFilter('all')">All <span class="ct">${counts.all}</span></button>
    ${STAGE_ORDER.filter(s=>counts[s]>0).map(s=>
      `<button class="match-chip ${MATCH_FILTER===s?'on':''}" onclick="setMatchFilter('${s}')">${esc(STAGE_NAMES[s])} <span class="ct">${counts[s]}</span></button>`
    ).join('')}
  </div>`;

  // Next-up banner
  const nx = nextMatchObj();
  let banner = '';
  if(nx){
    const m = nx.m;
    const live = isMatchLive(m);
    banner = `<div class="next-up-banner ${live?'live':''}">
      <div class="nu-left">
        <div class="nu-label">${live?'LIVE NOW':'NEXT UP'}</div>
        <div class="nu-teams">
          <span class="nu-flag">${flagOf(m.team_a)}</span>
          <span class="nu-name">${esc(m.team_a)}</span>
          <span class="nu-vs">vs</span>
          <span class="nu-name">${esc(m.team_b)}</span>
          <span class="nu-flag">${flagOf(m.team_b)}</span>
        </div>
        <div class="nu-meta">${esc(STAGE_NAMES[m.stage]||m.stage)} · ${esc(fmtMatchDate(m.date))} · Kick-off ${esc(m.kickoff||'TBC')}</div>
      </div>
      <div class="nu-cd" id="nu-cd" data-target="${nx.t.toISOString()}">${live?'LIVE':countdownText(nx.t.getTime())}</div>
    </div>`;
  }

  // Filter
  const shown = MATCH_FILTER==='all' ? all : all.filter(m=>m.stage===MATCH_FILTER);
  const nextId = nx ? nx.m.id : null;

  const cards = shown.map((m,i)=>{
    const isNext = m.id === nextId;
    const live = isMatchLive(m);
    const indicators = [];
    if(m.guestlist) indicators.push('<span class="match-mark guest" title="Guestlist"></span>');
    if(m.pundits) indicators.push('<span class="match-mark pundit" title="Pundits"></span>');
    if(m.highlight) indicators.push('<span class="match-mark highlight" title="Special"></span>');
    const statusClass = (m.status||'').toLowerCase().replace(/\s+/g,'-');
    const fanzoneTime = m.fanzone_open ? `Fanzone ${esc(m.fanzone_open)}${m.end_time?' → '+esc(m.end_time):''}` : '';
    return `<div class="match-card ${isNext?'next':''} ${live?'live':''} match-fade-in"
      style="animation-delay:${Math.min(i*40,400)}ms" onclick="openMatch('${m.id}')">
      <div class="match-head">
        <span class="match-stage">${esc(STAGE_NAMES[m.stage]||m.stage)}</span>
        <span class="match-status status-${statusClass}">${esc(m.status||'')}</span>
      </div>
      <div class="match-date-row">${esc(fmtMatchDate(m.date))}</div>
      <div class="match-teams">
        <div class="match-team">
          <span class="flag">${flagOf(m.team_a)}</span>
          <div class="nm">${esc(m.team_a)}</div>
        </div>
        <div class="match-vs">VS</div>
        <div class="match-team">
          <span class="flag">${flagOf(m.team_b)}</span>
          <div class="nm">${esc(m.team_b)}</div>
        </div>
      </div>
      <div class="match-time">
        <div class="ko-lab">Kick-off</div>
        <div class="ko">${esc(m.kickoff||'TBC')}</div>
      </div>
      ${(fanzoneTime || m.venue_note) ? `<div class="match-foot">
        ${fanzoneTime ? `<span>${fanzoneTime}</span>` : '<span></span>'}
        ${indicators.length ? `<span class="match-marks">${indicators.join('')}</span>` : ''}
      </div>` : ''}
      ${m.venue_note ? `<div class="match-note">${esc(m.venue_note)}</div>` : ''}
    </div>`;
  }).join('');

  // Start the live ticker
  if(!MATCH_TICK){
    MATCH_TICK = setInterval(()=>{
      if(state.view !== 'matches') return;
      const el = document.getElementById('nu-cd');
      if(el && el.dataset.target){
        const t = new Date(el.dataset.target).getTime();
        const live = Date.now() >= t && Date.now() <= t + 2.5*60*60*1000;
        el.textContent = live ? 'LIVE' : countdownText(t);
      }
    }, 30000);
  }

  return banner + chips + `<div class="match-grid">${cards||'<div class="empty"><p>No matches in this stage.</p></div>'}</div>
    <div class="match-legend">
      <span class="leg"><span class="match-mark guest"></span>Guestlist</span>
      <span class="leg"><span class="match-mark pundit"></span>Pundits</span>
      <span class="leg"><span class="match-mark highlight"></span>Special</span>
      <span class="leg" style="margin-left:auto;color:var(--soft);font-style:italic">Tap a match to add notes</span>
    </div>`;
}

  m.fanzone_open = $('#mt-fz').value;
  m.end_time = $('#mt-end').value;
  m.stage = $('#mt-stage').value;
  m.status = $('#mt-status').value;
  m.team_a = $('#mt-a').value.trim();
  m.team_b = $('#mt-b').value.trim();
  m.venue_note = $('#mt-vn').value.trim();
  m.highlight = $('#mt-hl').value.trim();
  m.pundits = $('#mt-pn').value.trim();
  m.guestlist = $('#mt-gl').value;
  m.notes = $('#mt-nt').value;
  logActivity('updated match', `${m.team_a} vs ${m.team_b}`);
  saveData(); closeModal(); render();
}

function deleteMatch(id){
  if(!confirm('Delete this match from the schedule?')) return;
  const i = (DATA.matches||[]).findIndex(x=>x.id===id);
  if(i>=0){
    const m = DATA.matches[i];
    DATA.matches.splice(i,1);
    logActivity('deleted match',`${m.team_a} vs ${m.team_b}`);
    saveData(); closeModal(); render();
  }
}

/* ============================ AI ASSISTANT ============================ */
const AI_KEY_STORAGE = 'fanzone-ai-key';
let AI_HISTORY = [];

function getAIKey(){ return localStorage.getItem(AI_KEY_STORAGE) || ''; }
function setAIKey(k){ localStorage.setItem(AI_KEY_STORAGE, k); }
function aiResetKey(){
  if(confirm('Remove your saved AI key from this browser?')){
    localStorage.removeItem(AI_KEY_STORAGE);
    AI_HISTORY=[];
    renderAIPanel();
    flash('AI key cleared');
  }
}

function openAI(){
  if(!ME || ME.role!=='admin'){ flash('AI is admin-only'); return; }
  document.body.classList.add('ai-open');
  $('#ai-panel').classList.add('open');
  renderAIPanel();
}
function closeAI(){
  document.body.classList.remove('ai-open');
  $('#ai-panel').classList.remove('open');
}

function renderAIPanel(){
  const key = getAIKey();
  if(!key){
    $('#ai-body').innerHTML = `<div class="ai-setup">
      <h4>Set up FANZONE AI</h4>
      <p>The assistant uses Anthropic's Claude to read and update your tracker in plain English.
      Paste your Anthropic API key below. Get one at <b>console.anthropic.com</b> &rarr; API Keys.
      It's saved in this browser only — never sent to the database or to other team members.</p>
      <input id="ai-key-in" type="password" placeholder="sk-ant-..." autocomplete="off">
      <button onclick="aiSaveKey()">Save key &amp; start</button>
      <p style="margin-top:14px;font-size:11.5px">Each team member sets up their own key. Costs go to their own Anthropic account.</p>
    </div>`;
    $('#ai-input-row').style.display='none';
    $('#ai-foot').style.display='none';
    return;
  }
  $('#ai-input-row').style.display='flex';
  $('#ai-foot').style.display='flex';
  if(AI_HISTORY.length===0){
    $('#ai-body').innerHTML = `<div class="ai-examples">
      <div class="lab">Try asking</div>
      <span class="ai-ex" onclick="aiTry(this)">What's overdue?</span>
      <span class="ai-ex" onclick="aiTry(this)">Summarise progress this week</span>
      <span class="ai-ex" onclick="aiTry(this)">Add a task: book DJ for opening night, due 5 Jun, assign Paloma</span>
      <span class="ai-ex" onclick="aiTry(this)">Mark all Ticketing tasks as In Progress</span>
      <span class="ai-ex" onclick="aiTry(this)">List my open tasks</span>
      <span class="ai-ex" onclick="aiTry(this)">Which workstreams are behind?</span>
    </div>
    <div id="ai-chat"></div>`;
  } else {
    $('#ai-body').innerHTML = `<div id="ai-chat"></div>`;
    renderAIChat();
  }
}

function aiTry(el){ const v = el.textContent; $('#ai-input').value = v; $('#ai-input').focus(); aiAutoGrow($('#ai-input')); }
function aiAutoGrow(el){
  if(!el) return;
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 220) + 'px';
}
function aiSaveKey(){
  const k = ($('#ai-key-in').value||'').trim();
  if(!k){ flash('Paste an API key first'); return; }
  setAIKey(k);
  flash('AI key saved');
  renderAIPanel();
}

function renderAIChat(){
  if(!$('#ai-chat')) return;
  $('#ai-chat').innerHTML = AI_HISTORY.map((m,i)=>{
    if(m.role==='user') return `<div class="ai-msg you"><div class="ai-bub">${esc(m.content)}</div></div>`;
    if(m.role==='thinking') return `<div class="ai-msg thinking"><div class="ai-bub">Thinking…</div></div>`;
    let html = `<div class="ai-msg bot"><div class="ai-bub">${esc(m.reply||'')}</div>`;
    if(m.actions && m.actions.length){
      html += `<div class="ai-actions"><div class="ah">Proposed changes (${m.actions.length})</div>`;
      m.actions.forEach(a=>{ html += `<div class="act">${aiFormatAction(a)}</div>`; });
      if(m.applied) html += `<div class="ai-applied">✓ Applied</div>`;
      else if(m.cancelled) html += `<div style="margin-top:8px;color:var(--muted);font-size:11px">Cancelled</div>`;
      else html += `<div class="btns">
        <button class="btn btn-primary btn-sm" onclick="aiApply(${i})">Apply changes</button>
        <button class="btn btn-ghost btn-sm" onclick="aiCancel(${i})">Cancel</button>
      </div>`;
      html += `</div>`;
    }
    html += `</div>`;
    return html;
  }).join('');
  const body = $('#ai-body'); body.scrollTop = body.scrollHeight;
}

function aiFormatAction(a){
  const w = a.ws ? (WS.find(x=>x.id===a.ws)||{}).name||a.ws : '';
  const fmt = obj => Object.entries(obj||{}).map(([k,v])=>`${k}: ${esc(String(v))}`).join(', ');
  switch(a.type){
    case 'create_task':
      return `<span class="ak">Add task</span> ${esc(a.title||'')} <span style="color:#666">· ${esc(w)} · ${esc(a.owner||'')}${a.due?' · due '+esc(a.due):''}</span>`;
    case 'update_task': {
      const t = DATA.tasks.find(x=>x.id===a.id);
      return `<span class="ak">Update</span> ${esc(t?t.title:a.id)} <span style="color:#666">→ ${fmt(a.fields)}</span>`;
    }
    case 'delete_task': {
      const t = DATA.tasks.find(x=>x.id===a.id);
      return `<span class="ak" style="color:#DC2626">Delete</span> ${esc(t?t.title:a.id)}`;
    }
    case 'create_idea': return `<span class="ak">New idea</span> ${esc(a.title||'')}`;
    case 'update_idea': {
      const it = DATA.ideas.find(x=>x.id===a.id);
      return `<span class="ak">Update idea</span> ${esc(it?it.title:a.id)} <span style="color:#666">→ ${fmt(a.fields)}</span>`;
    }
    case 'delete_idea': {
      const it = DATA.ideas.find(x=>x.id===a.id);
      return `<span class="ak" style="color:#DC2626">Delete idea</span> ${esc(it?it.title:a.id)}`;
    }
    default: return `<span class="ak">${esc(a.type||'action')}</span> ${esc(JSON.stringify(a))}`;
  }
}

function buildAISystem(){
  const today = todayISO();
  const wsList = WS.map(w=>`${w.id} = ${w.name}`).join('\n');
  const teamList = DATA.team.map(p=>p.name).join(', ');
  const tasks = DATA.tasks.map(t=>({
    id:t.id, code:t.code, title:t.title, ws:t.ws, owner:t.owner,
    prio:t.prio, status:t.status, due:t.due||null
  }));
  const ideas = DATA.ideas.map(i=>({id:i.id, title:i.title, status:i.status}));
  const meetings = (DATA.meetings||[]).slice(0,5).map(m=>({id:m.id, date:m.date, title:m.title, notes:m.notes}));
  const matches = (DATA.matches||[]).map(m=>({id:m.id, date:m.date, stage:m.stage, teams:`${m.team_a} vs ${m.team_b}`, kickoff:m.kickoff, status:m.status, venue_note:m.venue_note}));
  return `You are FANZONE AI, the assistant inside the FANZONE HQ tracker app for FANZONE Ibiza — an outdoor World Cup 2026 fan park at Bam-Bu-Ku on Ibiza. You help the user manage tasks, the team, ideas and assets.

Today: ${today}
Current user: ${ME ? ME.name : 'unknown'}

WORKSTREAMS (use the id, not the name, in actions):
${wsList}

TEAM members (use exact name in 'owner'):
${teamList}

CURRENT TASKS (id, code, title, ws, owner, prio, status, due):
${JSON.stringify(tasks)}

CURRENT IDEAS (id, title, status):
${JSON.stringify(ideas)}

RECENT MEETING RECAPS (most recent first; the user may ask you to turn items into tasks):
${JSON.stringify(meetings)}

MATCH SCHEDULE (the World Cup 2026 matches the fan park is showing, with id for reference):
${JSON.stringify(matches)}

Respond with ONLY a JSON object — no markdown fences, no preamble, just the JSON. Schema:

{"reply": "short friendly message for the user", "actions": [ ...zero or more action objects... ]}

Action types:
  {"type":"create_task","title":"...","ws":"<workstream id>","owner":"<team name>","prio":"High|Medium|Low","status":"Not Started|In Progress|Blocked|Done","due":"YYYY-MM-DD or empty","notes":"..."}
  {"type":"update_task","id":"<existing task id>","fields":{...only the fields to change...}}
  {"type":"delete_task","id":"<existing task id>"}
  {"type":"create_idea","title":"...","detail":"...","status":"New|Considering|Approved|Actioned"}
  {"type":"update_idea","id":"<existing idea id>","fields":{...}}
  {"type":"delete_idea","id":"<existing idea id>"}

If the user is just asking a question (status, summary, what is overdue, etc.), return actions:[] and put the answer in reply.
Always use real ids from the data when updating or deleting. Match owner names exactly. Use ISO dates (YYYY-MM-DD).
Output ONLY the JSON object.`;
}

async function aiCall(prompt){
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'content-type':'application/json',
      'x-api-key':getAIKey(),
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body: JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens:2000,
      system: buildAISystem(),
      messages:[{role:'user',content: prompt}]
    })
  });
  if(!res.ok){
    let msg = `HTTP ${res.status}`;
    try{ const j = await res.json(); msg = (j.error && j.error.message) || msg; }catch{}
    throw new Error(msg);
  }
  const data = await res.json();
  const txt = ((data.content && data.content[0] && data.content[0].text) || '').trim();
  const clean = txt.replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/```$/,'').trim();
  try { const p = JSON.parse(clean); return {reply: p.reply||'', actions: Array.isArray(p.actions)?p.actions:[]}; }
  catch(e){ return {reply: txt, actions: []}; }
}

async function aiSend(){
  const inp = $('#ai-input');
  const prompt = (inp.value||'').trim();
  if(!prompt) return;
  inp.value = '';
  inp.style.height = 'auto';
  AI_HISTORY.push({role:'user',content:prompt});
  AI_HISTORY.push({role:'thinking'});
  if(!$('#ai-chat')){ $('#ai-body').innerHTML = `<div id="ai-chat"></div>`; }
  renderAIChat();
  try {
    const result = await aiCall(prompt);
    AI_HISTORY.pop();
    AI_HISTORY.push({role:'assistant', reply: result.reply, actions: result.actions});
  } catch(e){
    AI_HISTORY.pop();
    AI_HISTORY.push({role:'assistant', reply:'Sorry — '+(e.message||'something went wrong')+'. Check your API key in the panel footer.', actions:[]});
  }
  renderAIChat();
}

function aiApply(idx){
  const m = AI_HISTORY[idx];
  if(!m || !m.actions || m.applied) return;
  let created=0, updated=0, deleted=0;
  m.actions.forEach(a=>{
    try {
      if(a.type==='create_task'){
        const wsObj = WS.find(x=>x.id===a.ws) || WS[0];
        const n = DATA.tasks.filter(t=>t.ws===wsObj.id).length + 1;
        DATA.tasks.push({id:uid(), code: wsObj.id.slice(0,3).toUpperCase()+'-'+String(n).padStart(2,'0'),
          ws: wsObj.id, title: a.title||'Untitled', owner: a.owner||me(),
          prio: a.prio||'Medium', status: a.status||'Not Started',
          due: a.due||'', notes: a.notes||'', comments: []});
        created++;
      } else if(a.type==='update_task'){
        const t = DATA.tasks.find(x=>x.id===a.id);
        if(t && a.fields){ Object.assign(t, a.fields); updated++; }
      } else if(a.type==='delete_task'){
        const i = DATA.tasks.findIndex(x=>x.id===a.id);
        if(i>=0){ DATA.tasks.splice(i,1); deleted++; }
      } else if(a.type==='create_idea'){
        DATA.ideas.push({id:uid(), title:a.title||'Untitled', detail:a.detail||'',
          by:me(), status:a.status||'New', created:todayISO()});
        created++;
      } else if(a.type==='update_idea'){
        const it = DATA.ideas.find(x=>x.id===a.id);
        if(it && a.fields){ Object.assign(it, a.fields); updated++; }
      } else if(a.type==='delete_idea'){
        const i = DATA.ideas.findIndex(x=>x.id===a.id);
        if(i>=0){ DATA.ideas.splice(i,1); deleted++; }
      }
    } catch(e){ console.warn('action failed',a,e); }
  });
  logActivity('AI changes', `${created} created · ${updated} updated · ${deleted} deleted`);
  m.applied = true;
  saveData();
  renderAIChat();
  render();
  flash('Applied');
}

function aiCancel(idx){
  const m = AI_HISTORY[idx];
  if(!m) return;
  m.cancelled = true;
  renderAIChat();
}

/* ============================ BOOT ============================ */
async function startApp(){
  if(appStarted) return;
  appStarted=true;
  hideLogin();
  $('#view').innerHTML=`<div class="empty"><p>Loading FANZONE HQ…</p></div>`;
  ME=await loadProfile();
  DATA=await loadData();
  subscribeRealtime();
  render();
}
(async function boot(){
  const logo=document.querySelector('.brand .logo-img');
  if(logo) $('#lg-logo').src=logo.src;
  if(!sb){
    $('#login').style.display='flex';
    $('#lg-err').textContent='Could not load the secure connection. Refresh the page.';
    return;
  }
  renderLogin();
  const {data:{session}}=await sb.auth.getSession();
  if(session){ await startApp(); }
  else { showLogin(); }
  sb.auth.onAuthStateChange((event)=>{
    if(event==='SIGNED_IN' && !appStarted) startApp();
    if(event==='SIGNED_OUT') location.reload();
  });
})();
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });
